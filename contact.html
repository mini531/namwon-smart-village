<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 - Namwon GeoVision</title>
  <link rel="icon" href="assets/images/favicon_n.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/page-contact.css">
</head>
<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="contact-container">

    <div class="page-header">
      <div class="page-title-wrap">
        <h1>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span id="page-title-text">문의 등록</span>
        </h1>
        <p id="page-title-sub">Namwon GeoVision 이용 중 궁금하신 점을 남겨주세요. 담당자가 확인 후 답변 드립니다.</p>
      </div>
    </div>

    <div class="view-tabs">
      <button type="button" class="view-tab active" data-view="form">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        문의 등록
      </button>
      <button type="button" class="view-tab" data-view="list">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        내 문의 목록 <span class="inq-count-badge" id="inq-count-badge">(0)</span>
      </button>
    </div>

    <!-- 문의 등록 폼 -->
    <section class="view-panel active" id="panel-form">
      <div class="form-card">
        <h2>문의 등록</h2>

        <div class="form-field" id="field-title">
          <label>제목 <span class="req">*</span></label>
          <input type="text" id="inq-title" placeholder="문의 제목을 입력하세요 (최대 60자)" maxlength="60">
          <div class="error-msg">제목을 입력해 주세요.</div>
        </div>

        <div class="form-field" id="field-content">
          <label>내용 <span class="req">*</span></label>
          <textarea id="inq-content" placeholder="문의하실 내용을 구체적으로 작성해 주세요.&#10;기능 관련 문의라면 어느 메뉴·어느 단계에서 발생했는지 함께 적어주시면 빠른 답변에 도움이 됩니다."></textarea>
          <div class="error-msg">문의 내용을 입력해 주세요.</div>
        </div>

        <div class="form-field">
          <label>첨부 파일 <span class="opt">(선택)</span></label>
          <div class="file-upload">
            <label class="file-drop" id="file-drop">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <div class="fd-hint">클릭하거나 파일을 끌어다 놓아 업로드</div>
              <div class="fd-sub">이미지 · PDF · 문서 (최대 10MB, 5개까지)</div>
              <input type="file" id="inq-files" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.hwp,.txt">
            </label>
            <div class="file-list" id="file-list"></div>
          </div>
        </div>

      </div>
      <div class="form-actions">
        <button type="button" class="board-btn" id="btn-form-cancel">취소</button>
        <button type="button" class="board-btn board-btn-primary" id="btn-form-save">저장</button>
      </div>
    </section>

    <!-- 내 문의 목록 -->
    <section class="view-panel" id="panel-list">
      <div class="filter-panel">
        <div class="filter-row">
          <div class="filter-field">
            <label>상태</label>
            <select id="filter-status">
              <option value="">전체</option>
              <option value="pending">답변 대기</option>
              <option value="replied">답변 완료</option>
            </select>
          </div>
          <div class="filter-field">
            <label>제목</label>
            <input type="text" id="filter-keyword" placeholder="제목 검색">
          </div>
          <div class="filter-field date">
            <label>등록일</label>
            <div class="date-range">
              <input type="date" id="filter-from">
              <span class="sep">~</span>
              <input type="date" id="filter-to">
              <button type="button" class="board-quick-btn active" data-period="0">전체</button>
              <button type="button" class="board-quick-btn" data-period="1">1개월</button>
              <button type="button" class="board-quick-btn" data-period="3">3개월</button>
              <button type="button" class="board-quick-btn" data-period="6">6개월</button>
              <button type="button" class="board-quick-btn" data-period="12">12개월</button>
            </div>
          </div>
          <div class="filter-actions">
            <button type="button" class="board-btn" id="btn-filter-reset">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
              초기화
            </button>
            <button type="button" class="board-btn board-btn--dark" id="btn-filter-apply">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              검색
            </button>
          </div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-head">
          <div class="th-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            문의 목록
          </div>
          <button type="button" class="board-btn board-btn-primary" id="btn-new-inquiry">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            등록
          </button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>제목</th>
                <th class="col-status">상태</th>
                <th class="col-date">등록 일시</th>
              </tr>
            </thead>
            <tbody id="inq-tbody"></tbody>
          </table>
        </div>
      </div>

      <div id="empty-state-wrap"></div>
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- 문의 상세 -->
    <section class="view-panel" id="panel-detail">
      <div class="detail-card">
        <div class="detail-header">
          <h2 id="dv-title">-</h2>
          <div class="detail-meta">
            <span id="dv-status"></span>
            <span class="meta-sep"></span>
            <span id="dv-date">-</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-head">
            <span class="ds-marker">Q</span>
            <span class="ds-label">문의 내용</span>
          </div>
          <div class="detail-section-body" id="dv-content"></div>
          <div class="detail-attach-list" id="dv-attach" hidden></div>
        </div>

        <div class="detail-section answer" id="dv-answer-wrap">
          <div class="detail-section-head">
            <span class="ds-marker a">A</span>
            <span class="ds-label">답변</span>
            <span class="ds-sub" id="dv-answered-at"></span>
          </div>
          <div class="detail-section-body" id="dv-answer"></div>
        </div>
      </div>

      <div class="detail-foot">
        <button type="button" class="detail-list-btn" id="btn-detail-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          목록
        </button>
      </div>
    </section>

  </div>

  <div id="footer-include"></div>
</div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/policy-modal.js"></script>
<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'namwon-inquiries-v3';
  var PAGE_SIZE = 10;
  var MAX_FILES = 5;
  var MAX_SIZE_MB = 10;

  // 초기 샘플 데이터 (현장 공무원 맥락 — 다양한 부서·상태 분포)
  var SEED = [
    { id: 115, title: '사용자 매뉴얼 PDF 최신본을 어디서 받을 수 있나요?',
      content: '서비스 지원 > 사용자 매뉴얼 링크가 비어있어 다운로드가 되지 않습니다. 최신본(v2.3 기준) 받을 수 있는 경로 알려주세요.',
      author: '차남호', authorDept: '환경관리과', status: 'pending', createdAt: '2026-04-22T15:08:33', attachments: [] },
    { id: 114, title: '분석 결과 지도 위에 중첩되는 표시 투명도를 조절할 수 있나요?',
      content: '도로 포장 재질 레이어와 포트홀 탐지 결과를 동시에 보니 가독성이 떨어집니다. 레이어별 투명도 슬라이더가 있으면 좋겠습니다.',
      author: '박정수', authorDept: '도로관리과', status: 'pending', createdAt: '2026-04-20T10:41:02', attachments: [] },
    { id: 113, title: '지도 서비스에서 확대하면 일부 영역이 회색으로 표시됩니다',
      content: '인월면 동쪽 산간 지역을 18단계 이상 확대하면 정사영상이 회색 타일로 바뀌는데, 최신 영상이 해당 구역만 누락된 것인지 캐시 문제인지 확인 부탁드립니다.\n\n브라우저: Chrome 122, 사용자 계정: parkjs@namwon.go.kr',
      author: '박정수', authorDept: '도로관리과', status: 'replied', createdAt: '2026-04-17T13:20:44',
      attachments: [ { name: '회색표시_캡처.png', size: 1820000 } ],
      answer: '안녕하세요, 도로관리과 기술지원입니다.\n\n확인 결과 해당 구역(인월면 동쪽 산간)은 2026-03 촬영분에서 구름 때문에 촬영 누락된 구역입니다. 2026-05 재촬영 일정에 포함돼 있어, 6월 초 배포 시 정상 표시 예정입니다.\n\n임시로 2024년 정사영상 레이어를 사용하시면 해당 구역도 확인 가능합니다.',
      answeredAt: '2026-04-18T09:55:10', answeredBy: '이주원' },
    { id: 112, title: '농업기술센터용 대시보드 위젯 커스터마이징 요청',
      content: '농업기술센터 업무 특성상 곤포사일리지 탐지·비닐하우스 분포·경작지 면적 변화를 한 화면에서 보고 싶습니다. 부서별 대시보드 위젯을 사용자가 조합할 수 있게 해주실 수 있나요?',
      author: '노명석', authorDept: '농업기술센터', status: 'pending', createdAt: '2026-04-16T11:12:05', attachments: [] },
    { id: 111, title: '분석 이력 검색 시 날짜 범위 최대치 제한이 있나요?',
      content: '2024-01-01 ~ 현재까지 전체 기간으로 설정하면 검색이 안 됩니다. 분할해서 검색해야 하는데 1년 단위로 나누는 것이 맞는지 가이드 부탁합니다.',
      author: '유정호', authorDept: '기획감사실', status: 'replied', createdAt: '2026-04-14T16:45:00', attachments: [],
      answer: '현재 최대 조회 범위는 <strong>12개월</strong> 입니다. 성능 최적화를 위한 제약이며, 장기 통계는 보고서 생성 메뉴에서 연간 단위로 내보내기가 가능합니다.\n\n다음 분기 로드맵에서 범위 제한 완화를 검토 중입니다.',
      answeredAt: '2026-04-15T08:30:00', answeredBy: '이주원' },
    { id: 110, title: '곤포사일리지 탐지 결과가 실제 현장과 차이 나는 경우가 있어요',
      content: '운봉면 4권역 최근 분석(26.04.11)에서 곤포 탐지 개수가 현장 확인보다 약 5~8개 적게 잡혔습니다.\n산그늘이 진 구역은 탐지율이 좀 낮은 듯한데, 이런 경우 보정 방법이나 재분석 요청 절차가 있나요?\n\n첨부로 해당 필지 지번과 현장 사진 올렸습니다. 확인 부탁드립니다.',
      author: '손지영', authorDept: '농업기술센터', status: 'replied', createdAt: '2026-04-14T14:22:10',
      attachments: [ { name: '운봉면4권역_현장사진.zip', size: 4832000 }, { name: '필지_지번_목록.xlsx', size: 28500 } ],
      answer: '안녕하세요. 산그늘 조건의 탐지 정확도 개선이 4월 모델 v2.3 업데이트에 포함되어 있습니다. (4/15 배포)\n\n해당 필지에 대해 추론 이력 > "재분석" 을 실행해 주시면 v2.3 모델로 재처리됩니다. 재분석 후에도 차이가 크다면 첨부하신 현장 사진과 함께 추가 문의 주세요. 개별 필지 보정도 진행 가능합니다.',
      answeredAt: '2026-04-16T10:12:40', answeredBy: '이주원' },
    { id: 109, title: '환경관리과 업무용으로 지도 레이어 권한 분리 요청',
      content: '환경관리과에서는 영농 관련 탐지 레이어(곤포·비닐하우스)는 필요하지 않습니다. 부서별로 기본 노출 레이어를 다르게 설정할 수 있을까요?',
      author: '차남호', authorDept: '환경관리과', status: 'pending', createdAt: '2026-04-11T09:30:12', attachments: [] },
    { id: 108, title: '회원가입 신청 후 승인까지 얼마나 걸리나요?',
      content: '4/8 오전에 계정 신청을 했는데 아직 활성화가 안 됐습니다. 승인 기준 시간이 있다면 공유 부탁드립니다.',
      author: '강해원', authorDept: '홍보전산과(외부협력)', status: 'replied', createdAt: '2026-04-09T10:15:22', attachments: [],
      answer: '영업일 기준 1~2일 내 승인이 원칙이며, 신청 내용이 누락된 경우 담당자가 추가 정보 요청을 드립니다. 확인해보니 소속 부서 확인이 필요해 대기 중이었습니다. 방금 처리되었으니 다시 로그인해 주세요.',
      answeredAt: '2026-04-09T14:02:11', answeredBy: '이주원' },
    { id: 107, title: '보고서 PDF 에 지도 캡처 이미지가 잘려서 나옵니다',
      content: 'A4 세로 방향으로 PDF 를 내보내면 지도 우측 30% 가량이 잘립니다. 가로 방향은 정상이지만 세로로 맞추고 싶어서요.',
      author: '김서영', authorDept: '환경관리과', status: 'pending', createdAt: '2026-04-07T16:22:08',
      attachments: [ { name: '보고서_세로방향_잘림.pdf', size: 740000 } ] },
    { id: 106, title: 'AI 추론 보고서 활용 방법 문의',
      content: '월간 보고서에서 정사영상 분석 결과만 골라서 출력할 수 있나요?\n카메라 영상 분석과 정사영상 분석 결과를 분리해서 따로 보고서를 만들고 싶은데, 현재는 두 모델이 합쳐진 형태로만 출력되는 것 같습니다.',
      author: '이한길', authorDept: '도로관리과', status: 'replied', createdAt: '2026-04-03T10:00:59',
      attachments: [],
      answer: '안녕하세요, 도로관리과입니다.\n\n보고서 생성 메뉴에서 모델 종류 필터를 "정사영상" 또는 "카메라" 로 지정하시면 해당 모델의 분석 결과만 포함된 보고서가 생성됩니다.\n\n1) 상단 메뉴 > 보고서 > 보고서 생성\n2) 기본 설정 > 모델 종류 > "정사영상" 선택\n3) 기간·지역·보고서 유형 선택 후 "보고서 생성" 클릭\n4) PDF 다운로드 버튼으로 저장\n\n추가 문의 사항은 언제든지 남겨주세요.',
      answeredAt: '2026-04-04T09:12:00', answeredBy: '이주원' },
    { id: 105, title: '비밀번호 5회 실패 후 잠금 해제는 어떻게 하나요?',
      content: '직원 중 한 분이 비밀번호를 여러 번 틀려 계정이 잠겼습니다. 관리자 처리가 필요한지 알려주세요.',
      author: '오길수', authorDept: '도로관리과', status: 'replied', createdAt: '2026-03-28T14:10:40', attachments: [],
      answer: '사용자 관리 페이지에서 해당 계정 상세 > 비밀번호 실패 초기화 버튼으로 즉시 해제 가능합니다. 잠금 해제 후에는 사용자에게 비밀번호 재설정 링크를 발송해 주세요.',
      answeredAt: '2026-03-28T15:22:01', answeredBy: '이주원' },
    { id: 104, title: '모바일에서 지도가 느리게 로딩됩니다',
      content: '태블릿(iPad Pro, Safari)에서 지도 서비스가 타일 당 3~4초씩 지연됩니다. 모바일 최적화 일정이 있나요?',
      author: '정용찬', authorDept: '홍보전산과', status: 'pending', createdAt: '2026-03-25T11:08:00', attachments: [] }
  ];

  var state = {
    inquiries: loadInquiries(),
    pendingFiles: [],
    filter: { status: '', keyword: '', from: '', to: '', quick: 0 },
    page: 1
  };

  function loadInquiries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return SEED.slice();
  }

  function saveInquiries() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.inquiries)); }
    catch (e) {}
  }

  function fmtDateTime(iso) {
    if (!iso) return '';
    var s = iso.replace('T', ' ').substring(0, 16).replace(/-/g, '.');
    return s;
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  // ── 뷰 전환 ──
  // 페이지 타이틀은 메뉴명(단일 '문의하기') 대신 행동 기반으로 갱신.
  var VIEW_TITLES = {
    form:   { title: '문의 등록', sub: 'Namwon GeoVision 이용 중 궁금하신 점을 남겨주세요. 담당자가 확인 후 답변 드립니다.' },
    list:   { title: '내 문의 목록', sub: '내가 등록한 문의와 답변 현황을 확인할 수 있습니다.' },
    detail: { title: '문의 열람', sub: '문의 내용과 답변을 확인합니다.' }
  };
  function switchView(view) {
    // detail 뷰는 list 탭에 속하는 서브 뷰이므로 list 탭 활성 유지
    var tabKey = (view === 'detail') ? 'list' : view;
    document.querySelectorAll('.view-tab').forEach(function (t) {
      t.classList.toggle('active', t.dataset.view === tabKey);
    });
    document.querySelectorAll('.view-panel').forEach(function (p) {
      p.classList.toggle('active', p.id === 'panel-' + view);
    });
    if (view === 'list') {
      state.page = 1;
      renderList();
    }
    var titleInfo = VIEW_TITLES[view] || VIEW_TITLES.form;
    document.getElementById('page-title-text').textContent = titleInfo.title;
    document.getElementById('page-title-sub').textContent = titleInfo.sub;
    document.title = titleInfo.title + ' - Namwon GeoVision';
    document.querySelector('.page-body').scrollTo({ top: 0, behavior: 'auto' });
  }

  // ── 폼 ──
  function resetForm() {
    document.getElementById('inq-title').value = '';
    document.getElementById('inq-content').value = '';
    state.pendingFiles = [];
    renderFileList();
    document.getElementById('field-title').classList.remove('has-error');
    document.getElementById('field-content').classList.remove('has-error');
  }

  function renderFileList() {
    var el = document.getElementById('file-list');
    el.innerHTML = '';
    state.pendingFiles.forEach(function (f, i) {
      var item = document.createElement('div');
      item.className = 'file-list-item';
      item.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>' +
        '<span class="fli-name">' + escapeHtml(f.name) + '</span>' +
        '<span class="fli-size">' + formatFileSize(f.size) + '</span>' +
        '<button type="button" class="fli-remove" aria-label="삭제"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      item.querySelector('.fli-remove').addEventListener('click', function () {
        state.pendingFiles.splice(i, 1);
        renderFileList();
      });
      el.appendChild(item);
    });
  }

  function handleFiles(fileList) {
    var newOnes = Array.prototype.slice.call(fileList);
    newOnes.forEach(function (f) {
      if (state.pendingFiles.length >= MAX_FILES) {
        if (window.NotifyUI) NotifyUI.warn('첨부 파일은 최대 ' + MAX_FILES + '개까지 등록할 수 있습니다.', '첨부 제한');
        return;
      }
      if (f.size > MAX_SIZE_MB * 1024 * 1024) {
        if (window.NotifyUI) NotifyUI.warn(f.name + ' 파일이 ' + MAX_SIZE_MB + 'MB 를 초과합니다.', '용량 초과');
        return;
      }
      state.pendingFiles.push({ name: f.name, size: f.size });
    });
    renderFileList();
  }

  function validateForm() {
    var title = document.getElementById('inq-title').value.trim();
    var content = document.getElementById('inq-content').value.trim();
    var ok = true;
    document.getElementById('field-title').classList.toggle('has-error', !title);
    document.getElementById('field-content').classList.toggle('has-error', !content);
    if (!title || !content) ok = false;
    return ok;
  }

  function saveInquiry() {
    if (!validateForm()) return;
    var title = document.getElementById('inq-title').value.trim();
    var content = document.getElementById('inq-content').value.trim();
    var now = new Date();
    var pad = function (n) { return String(n).padStart(2, '0'); };
    var iso = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
      'T' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    state.inquiries.unshift({
      id: Date.now(),
      title: title,
      content: content,
      status: 'pending',
      createdAt: iso,
      attachments: state.pendingFiles.slice()
    });
    saveInquiries();
    if (window.NotifyUI) NotifyUI.toast('문의가 등록되었습니다. 답변은 영업일 기준 1-2일 내 제공됩니다.', '등록 완료');
    resetForm();
    switchView('list');
  }

  // ── 목록 ──
  function applyQuickPeriod(months) {
    var now = new Date();
    var to = now.toISOString().substring(0, 10);
    var from = '';
    if (months > 0) {
      var fromDate = new Date(now);
      fromDate.setMonth(fromDate.getMonth() - months);
      from = fromDate.toISOString().substring(0, 10);
    }
    document.getElementById('filter-from').value = from;
    document.getElementById('filter-to').value = months > 0 ? to : '';
    state.filter.from = from;
    state.filter.to = months > 0 ? to : '';
    state.filter.quick = months;
    document.querySelectorAll('.date-range .board-quick-btn').forEach(function (b) {
      b.classList.toggle('active', Number(b.dataset.period) === months);
    });
  }

  function getFiltered() {
    var list = state.inquiries.slice();
    if (state.filter.status) list = list.filter(function (n) { return n.status === state.filter.status; });
    if (state.filter.keyword) {
      var kw = state.filter.keyword.toLowerCase();
      list = list.filter(function (n) { return n.title.toLowerCase().indexOf(kw) !== -1; });
    }
    if (state.filter.from) {
      list = list.filter(function (n) { return n.createdAt.substring(0, 10) >= state.filter.from; });
    }
    if (state.filter.to) {
      list = list.filter(function (n) { return n.createdAt.substring(0, 10) <= state.filter.to; });
    }
    list.sort(function (a, b) { return b.createdAt.localeCompare(a.createdAt); });
    return list;
  }

  function renderList() {
    var all = getFiltered();
    var tbody = document.getElementById('inq-tbody');
    var emptyWrap = document.getElementById('empty-state-wrap');
    tbody.innerHTML = '';
    emptyWrap.innerHTML = '';

    document.getElementById('inq-count-badge').textContent = '(' + state.inquiries.length + ')';

    if (all.length === 0) {
      emptyWrap.innerHTML =
        '<div class="empty-state">' +
          '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<p>등록된 문의가 없습니다.</p>' +
        '</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    var totalPages = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
    if (state.page > totalPages) state.page = totalPages;
    var startIdx = (state.page - 1) * PAGE_SIZE;
    var pageItems = all.slice(startIdx, startIdx + PAGE_SIZE);

    pageItems.forEach(function (inq) {
      var tr = document.createElement('tr');
      var pillClass = inq.status === 'replied' ? 'replied' : 'pending';
      var pillText = inq.status === 'replied' ? '답변 완료' : '답변 대기';
      tr.innerHTML =
        '<td><span class="inquiry-title">' + escapeHtml(inq.title) + '</span></td>' +
        '<td class="col-status"><span class="status-pill ' + pillClass + '">' + pillText + '</span></td>' +
        '<td class="col-date">' + fmtDateTime(inq.createdAt) + '</td>';
      (function (item) {
        tr.addEventListener('click', function () { openDetail(item); });
      })(inq);
      tbody.appendChild(tr);
    });

    renderPagination(totalPages);
  }

  function openDetail(inq) {
    var pillClass = inq.status === 'replied' ? 'replied' : 'pending';
    var pillText = inq.status === 'replied' ? '답변 완료' : '답변 대기';
    document.getElementById('dv-title').textContent = inq.title;
    document.getElementById('dv-status').innerHTML = '<span class="status-pill ' + pillClass + '">' + pillText + '</span>';
    document.getElementById('dv-date').textContent = '등록 ' + fmtDateTime(inq.createdAt);
    document.getElementById('dv-content').textContent = inq.content || '';

    var attachWrap = document.getElementById('dv-attach');
    attachWrap.innerHTML = '';
    if (inq.attachments && inq.attachments.length) {
      attachWrap.hidden = false;
      inq.attachments.forEach(function (a) {
        var item = document.createElement('div');
        item.className = 'detail-attach-item';
        item.innerHTML =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>' +
          '<span class="da-name">' + escapeHtml(a.name) + '</span>' +
          '<span class="da-size">' + (typeof a.size === 'number' ? formatFileSize(a.size) : a.size) + '</span>';
        attachWrap.appendChild(item);
      });
    } else {
      attachWrap.hidden = true;
    }

    var ansWrap = document.getElementById('dv-answer-wrap');
    var ansBody = document.getElementById('dv-answer');
    var ansAt = document.getElementById('dv-answered-at');
    if (inq.status === 'replied' && inq.answer) {
      ansWrap.classList.remove('pending');
      ansBody.textContent = inq.answer;
      ansAt.textContent = inq.answeredAt ? '답변 ' + fmtDateTime(inq.answeredAt) : '';
    } else {
      ansWrap.classList.add('pending');
      ansBody.textContent = '담당자가 확인 후 답변 드릴 예정입니다. 답변까지 영업일 기준 1-2일 소요됩니다.';
      ansAt.textContent = '';
    }

    switchView('detail');
  }

  function renderPagination(totalPages) {
    var cont = document.getElementById('pagination');
    cont.innerHTML = '';
    function mkBtn(label, page, opts) {
      opts = opts || {};
      var b = document.createElement('button');
      b.className = 'page-btn';
      if (opts.active) b.classList.add('active');
      b.textContent = label;
      if (opts.disabled) b.disabled = true;
      else b.addEventListener('click', function () {
        state.page = page;
        renderList();
      });
      cont.appendChild(b);
    }
    mkBtn('‹', state.page - 1, { disabled: state.page <= 1 });
    for (var p = 1; p <= totalPages; p++) {
      mkBtn(String(p), p, { active: p === state.page });
    }
    mkBtn('›', state.page + 1, { disabled: state.page >= totalPages });
  }

  // ── 이벤트 바인딩 ──
  document.querySelectorAll('.view-tab').forEach(function (tab) {
    tab.addEventListener('click', function () { switchView(tab.dataset.view); });
  });

  document.getElementById('btn-form-save').addEventListener('click', saveInquiry);
  document.getElementById('btn-form-cancel').addEventListener('click', function () {
    if (window.NotifyUI) {
      NotifyUI.confirm('작성 중인 내용이 모두 삭제됩니다. 계속하시겠습니까?', function () {
        resetForm();
      }, { title: '작성 취소', okText: '취소', cancelText: '돌아가기', type: 'danger' });
    } else {
      resetForm();
    }
  });

  // 파일 업로드
  var fileInput = document.getElementById('inq-files');
  var fileDrop = document.getElementById('file-drop');
  fileInput.addEventListener('change', function () {
    handleFiles(fileInput.files);
    fileInput.value = '';
  });
  ['dragenter', 'dragover'].forEach(function (ev) {
    fileDrop.addEventListener(ev, function (e) {
      e.preventDefault();
      fileDrop.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(function (ev) {
    fileDrop.addEventListener(ev, function (e) {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
    });
  });
  fileDrop.addEventListener('drop', function (e) {
    if (e.dataTransfer && e.dataTransfer.files) handleFiles(e.dataTransfer.files);
  });

  // 실시간 에러 제거
  document.getElementById('inq-title').addEventListener('input', function () {
    document.getElementById('field-title').classList.remove('has-error');
  });
  document.getElementById('inq-content').addEventListener('input', function () {
    document.getElementById('field-content').classList.remove('has-error');
  });

  // 필터
  document.querySelectorAll('.date-range .board-quick-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      applyQuickPeriod(Number(b.dataset.period));
    });
  });
  ['filter-from', 'filter-to'].forEach(function (id) {
    document.getElementById(id).addEventListener('change', function () {
      state.filter.quick = -1;
      document.querySelectorAll('.date-range .board-quick-btn').forEach(function (b) { b.classList.remove('active'); });
    });
  });

  document.getElementById('btn-filter-apply').addEventListener('click', function () {
    state.filter.status = document.getElementById('filter-status').value;
    state.filter.keyword = document.getElementById('filter-keyword').value.trim();
    state.filter.from = document.getElementById('filter-from').value;
    state.filter.to = document.getElementById('filter-to').value;
    state.page = 1;
    renderList();
  });
  document.getElementById('btn-filter-reset').addEventListener('click', function () {
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-keyword').value = '';
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';
    state.filter = { status: '', keyword: '', from: '', to: '', quick: 0 };
    document.querySelectorAll('.date-range .board-quick-btn').forEach(function (b) {
      b.classList.toggle('active', Number(b.dataset.period) === 0);
    });
    state.page = 1;
    renderList();
  });
  document.getElementById('filter-keyword').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('btn-filter-apply').click();
  });

  document.getElementById('btn-new-inquiry').addEventListener('click', function () {
    resetForm();
    switchView('form');
  });

  // 상세 뷰 목록 버튼
  document.getElementById('btn-detail-back').addEventListener('click', function () { switchView('list'); });

  // 초기 렌더
  document.getElementById('inq-count-badge').textContent = '(' + state.inquiries.length + ')';
})();
</script>
</body>
</html>
