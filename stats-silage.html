<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조사료 탐지 통계 - Namwon GeoVision</title>
  <link rel="icon" href="assets/images/favicon_n.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/page-stats.css">
</head>
<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="stats-layout">

    <!-- 좌측 설정 패널 -->
    <aside class="stats-config">
      <div class="stats-config-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        조사료 탐지 통계
      </div>
      <div class="stats-config-sub">AI 분석 과제를 선택하고 지역·클래스별 집계를 확인해요</div>

      <!-- AI 분석 과제 (조사료 탐지 통계 전용) -->
      <div class="stats-section">
        <div class="stats-section-title">AI 분석 과제</div>
        <select id="statsTypeSelect" class="form-select" title="AI 분석 과제" data-rule-required data-msg-required="AI 분석 과제를 선택해 주세요." required>
          <option value="020411">사료작물(생육기) 탐지결과</option>
          <option value="020412">사료작물(생산기) 탐지결과</option>
          <option value="020413">곤포사일리지 탐지결과</option>
        </select>
      </div>

      <!-- 클래스 (AI 분석 과제에 따라 동적 구성) -->
      <div class="stats-section">
        <div class="stats-section-title">클래스</div>
        <div class="stats-class-list" id="stats-class-list">
          <label class="stats-class-item is-all">
            <input type="checkbox" class="form-check" id="stats-class-all" checked>
            <span>전체</span>
          </label>
          <!-- 항목은 JS 가 주입 -->
        </div>
      </div>

      <!-- 기준 (최근 분석 결과 3건 — 더 보기로 전체 검색) -->
      <div class="stats-section">
        <div class="stats-section-title">
          <span>기준 (최근 분석 결과)</span>
          <button type="button" class="btn btn-secondary btn-sm" id="stats-more">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            더 보기
          </button>
        </div>
        <div class="stats-job-list" id="stats-job-list">
          <label class="stats-job-card">
            <input type="radio" name="stats-job" value="FG03" checked>
            <div class="stats-job-card-info">
              <div class="stats-job-card-title">남원 운봉읍 4월 / 생육기</div>
              <div class="stats-job-card-meta">2025.04.29 · YOLOv11-4종-생육</div>
            </div>
          </label>
          <label class="stats-job-card">
            <input type="radio" name="stats-job" value="FG02">
            <div class="stats-job-card-info">
              <div class="stats-job-card-title">남원시 사매면 8월 / 사료작물(수단그라스, 옥수수) 생육기 분석</div>
              <div class="stats-job-card-meta">2025.08.30 · YOLOv11-4종-생육</div>
            </div>
          </label>
          <label class="stats-job-card">
            <input type="radio" name="stats-job" value="FG01">
            <div class="stats-job-card-info">
              <div class="stats-job-card-title">남원 운봉읍 4월 / 사료작물(IRG, 호밀) 생육기 분석</div>
              <div class="stats-job-card-meta">2025.04.29 · YOLOv11-4종-생육</div>
            </div>
          </label>
        </div>
      </div>

      <!-- 액션 -->
      <div class="stats-actions">
        <button type="button" class="btn btn-secondary" id="stats-reset">초기화</button>
        <button type="button" class="btn btn-primary" id="stats-run">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          통계 보기
        </button>
      </div>
    </aside>

    <!-- 우측 결과 영역 -->
    <main class="stats-main">
      <!-- 빈 상태 -->
      <div class="stats-empty" id="stats-empty">
        <svg width="88" height="88" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
          <line x1="15" y1="21" x2="15" y2="13"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
        </svg>
        <p>AI 분석이 완료된 후 이용할 수 있어요</p>
        <div class="stats-empty-sub">좌측에서 과제·클래스·기준 분석을 선택하고 <strong>통계 보기</strong>를 눌러 주세요</div>
      </div>

      <!-- 결과 영역 (통계 보기 후 노출) — 탭은 카드 내부에, 사용자 정보 열람과 동일 구조 -->
      <div class="stats-result" id="stats-result" hidden>

        <!-- 탭 + 차트/표 카드 -->
        <div class="card">
          <div class="history-tabs" role="tablist">
            <button type="button" class="history-tab active" data-tab="region" role="tab">지역별 통계</button>
            <button type="button" class="history-tab" data-tab="class" role="tab">클래스별 통계</button>
          </div>
          <div class="history-panel" id="panel-region">
            <div class="stats-chart-body">
              <div class="stats-chart-wrap" id="stats-chart"></div>
            </div>
            <div class="stats-table-head">
              <div class="stats-table-title" id="stats-table-title">지역별 집계</div>
              <button type="button" class="btn btn-secondary btn-sm" id="stats-excel">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                엑셀 다운로드
              </button>
            </div>
            <div class="stats-table-wrap">
              <table class="data-table" id="stats-table">
                <thead></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
          <div class="history-panel hidden" id="panel-class">
            <div class="stats-chart-body">
              <div class="stats-chart-wrap" id="stats-chart-class"></div>
            </div>
            <div class="stats-table-head">
              <div class="stats-table-title">클래스별 집계</div>
            </div>
            <div class="stats-table-wrap">
              <table class="data-table" id="stats-class-table">
                <thead></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </main>

    <!-- 더 보기 모달 — 분석 결과 찾기 -->
    <div class="modal-backdrop" id="stats-search-modal" aria-hidden="true">
      <div class="modal-card modal-card--xl">
        <div class="modal-head">
          <div class="title">분석 결과 찾기</div>
          <button type="button" class="close-btn" id="stats-search-close" aria-label="닫기">×</button>
        </div>
        <div class="modal-body">

          <!-- 검색 툴바 — 공지사항/관리자 게시판과 동일한 공용 .board-* 패턴 -->
          <div class="board-toolbar">
            <div class="board-field board-field--search">
              <label for="sm-search-input">검색어</label>
              <div class="board-field-row">
                <select class="board-search-select" id="sm-search-field">
                  <option value="all">전체</option>
                  <option value="ortho">정사 영상 명</option>
                  <option value="analysis">분석명</option>
                  <option value="task">분석 과제명</option>
                </select>
                <input type="text" class="board-search-input" id="sm-search-input" placeholder="검색어를 입력하세요.">
              </div>
            </div>
            <div class="board-field">
              <label for="sm-cat">분류</label>
              <select class="board-search-select" id="sm-cat">
                <option value="all">전체</option>
                <option value="growth">사료작물(생육기)</option>
                <option value="harvest">사료작물(생산기)</option>
                <option value="silage">곤포사일리지</option>
              </select>
            </div>
            <div class="board-field">
              <label for="runnerType">실행자</label>
              <select class="board-search-select form-select" id="runnerType" name="runnerType">
                <option value="" selected>전체</option>
                <option value="01">내 분석 결과</option>
                <option value="02">공유 받은 분석 결과</option>
              </select>
            </div>
            <div class="board-field board-field--period">
              <label>기준일</label>
              <div class="board-period-row">
                <div class="board-period-dates">
                  <input type="date" class="board-date-input" id="sm-from" placeholder="YYYY-MM-DD">
                  <span class="board-period-sep">~</span>
                  <input type="date" class="board-date-input" id="sm-to" placeholder="YYYY-MM-DD">
                </div>
                <div class="board-period-quicks">
                  <button type="button" class="board-quick-btn active" data-months="0">전체</button>
                  <button type="button" class="board-quick-btn" data-months="1">1개월</button>
                  <button type="button" class="board-quick-btn" data-months="3">3개월</button>
                  <button type="button" class="board-quick-btn" data-months="6">6개월</button>
                  <button type="button" class="board-quick-btn" data-months="12">12개월</button>
                </div>
              </div>
            </div>
            <div class="board-toolbar-actions board-toolbar-actions--end">
              <button type="button" class="btn btn-secondary" id="sm-reset">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                초기화
              </button>
              <button type="button" class="btn btn-accent" id="sm-search">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                검색
              </button>
            </div>
          </div>

          <!-- AI 분석 내역 -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">AI 분석 내역</div>
            </div>
            <div class="card-body card-body--flush">
              <div class="stats-table-wrap">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th style="width:60px; text-align:center;">선택</th>
                      <th class="col-date" style="width:110px;">기준 일자</th>
                      <th>정사 영상 명</th>
                      <th style="width:130px;">분석 범위 유형</th>
                      <th class="col-wide">분석 범위 명</th>
                      <th class="col-wide">분석명</th>
                      <th style="width:170px;">분석 과제명</th>
                    </tr>
                  </thead>
                  <tbody id="stats-search-tbody"></tbody>
                </table>
              </div>
            </div>
            <div class="board-paginator board-paginator--embedded">
              <button type="button" class="board-page-btn">처음</button>
              <button type="button" class="board-page-btn">이전</button>
              <div class="board-page-pages"><button type="button" class="board-page-btn active">1</button></div>
              <button type="button" class="board-page-btn">다음</button>
              <button type="button" class="board-page-btn">마지막</button>
              <div class="board-page-size-wrap">
                <select class="board-page-size">
                  <option value="5">5</option>
                  <option value="10">10</option>
                  <option value="20">20</option>
                </select>
                <span>페이지 크기</span>
              </div>
              <div class="board-count" id="stats-search-count">총 <strong>0</strong>건 중 0~0행</div>
            </div>
          </div>

        </div>
        <div class="modal-foot">
          <button type="button" class="btn btn-secondary" id="stats-search-cancel">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            취소
          </button>
          <button type="button" class="btn btn-primary" id="stats-search-confirm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            확인
          </button>
        </div>
      </div>
    </div>

  </div>

  <div id="footer-include"></div>
</div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/policy-modal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
(function () {
  'use strict';

  // ── 데이터 ───────────────────────────────────────────────
  // 남원시 행정구역 39개 (읍·면·동)
  var REGIONS = [
    '금동', '갈치동', '고죽동', '광치동', '금지면', '내척동', '노암동', '대강면', '대산면', '덕과면',
    '도통동', '동충동', '보절면', '사매면', '산곡동', '산내면', '산동면', '송동면', '수지면', '식정동',
    '신정동', '신촌동', '쌍교동', '아영면', '어현동', '왕정동', '용정동', '운봉읍', '월락동', '이백면',
    '인월면', '조산동', '주생면', '주천면', '죽항동', '천거동', '하정동', '향교동', '화정동'
  ];

  // AI 분석 과제 코드별 클래스 세트
  var TASK_CLASSES = {
    '020411': [  // 사료작물(생육기)
      { key: 'IRG',         label: 'IRG(생육기)',        color: '#f44336' },
      { key: 'Rye',         label: '호밀(생육기)',       color: '#ce7e00' },
      { key: 'Corn',        label: '옥수수(생육기)',     color: '#2986cc' },
      { key: 'Sudan_Grass', label: '수단그라스(생육기)', color: '#6a329f' }
    ],
    '020412': [  // 사료작물(생산기)
      { key: 'IRG',         label: 'IRG(생산기)',        color: '#744700' },
      { key: 'Rye',         label: '호밀(생산기)',       color: '#8fce00' },
      { key: 'Corn',        label: '옥수수(생산기)',     color: '#16537e' },
      { key: 'Sudan_Grass', label: '수단그라스(생산기)', color: '#c90076' }
    ],
    '020413': [  // 곤포사일리지
      { key: 'Silage_Bale', label: '곤포사일리지',       color: '#bf9000' }
    ]
  };

  function getCurrentClasses() {
    var code = document.getElementById('statsTypeSelect').value;
    return TASK_CLASSES[code] || TASK_CLASSES['020411'];
  }

  // 기준 작업별 지역 × 클래스 면적 (㎡). 지정되지 않은 지역은 0.
  // FG03 = 운봉읍 4월 · 생육기 전체 (4종)
  // FG02 = 사매면 8월 · 수단그라스·옥수수만 (2종)
  // FG01 = 운봉읍 4월 · IRG·호밀만 (2종)
  var JOB_DATA = {
    FG03: {
      '운봉읍': { IRG: 32045, Rye: 18220, Corn: 2450, Sudan_Grass: 14380 },
      '인월면': { IRG: 12400, Rye:  5100, Corn:  820, Sudan_Grass:  3240 },
      '아영면': { IRG:  8200, Rye:  3400, Corn:    0, Sudan_Grass:  1680 },
      '산내면': { IRG:  4500, Rye:  1200, Corn:    0, Sudan_Grass:   940 },
      '주천면': { IRG:  2100, Rye:   640, Corn:    0, Sudan_Grass:   420 }
    },
    FG02: {
      '사매면': { IRG: 0, Rye: 0, Corn: 1480, Sudan_Grass: 19560 },
      '보절면': { IRG: 0, Rye: 0, Corn:  620, Sudan_Grass:  7200 },
      '주생면': { IRG: 0, Rye: 0, Corn:    0, Sudan_Grass:  3400 },
      '대강면': { IRG: 0, Rye: 0, Corn:  260, Sudan_Grass:  1840 }
    },
    FG01: {
      '운봉읍': { IRG: 24210, Rye: 10480, Corn: 0, Sudan_Grass: 0 },
      '인월면': { IRG:  7800, Rye:  2900, Corn: 0, Sudan_Grass: 0 },
      '아영면': { IRG:  3200, Rye:   680, Corn: 0, Sudan_Grass: 0 }
    }
  };

  function getSelectedJobId() {
    var el = document.querySelector('input[name="stats-job"]:checked');
    return el ? el.value : 'FG03';
  }
  function getEnabledClassKeys() {
    return Array.prototype.map.call(document.querySelectorAll('.stats-class-cb:checked'), function (cb) { return cb.value; });
  }

  // 과제 변경 시 클래스 체크리스트 재구성
  function rebuildClassList() {
    var list = document.getElementById('stats-class-list');
    // 기존 개별 항목 제거 (is-all 라벨은 보존)
    list.querySelectorAll('.stats-class-item:not(.is-all)').forEach(function (el) { el.remove(); });
    var classes = getCurrentClasses();
    classes.forEach(function (c) {
      var lbl = document.createElement('label');
      lbl.className = 'stats-class-item';
      lbl.innerHTML =
        '<input type="checkbox" class="form-check stats-class-cb" value="' + c.key + '" checked>' +
        '<span>' + c.label + '</span>';
      list.appendChild(lbl);
    });
    document.getElementById('stats-class-all').checked = true;
    bindClassCheckboxes();
  }

  function bindClassCheckboxes() {
    var allCb = document.getElementById('stats-class-all');
    var itemCbs = document.querySelectorAll('.stats-class-cb');
    itemCbs.forEach(function (cb) {
      cb.onchange = function () {
        var allChecked = Array.prototype.every.call(itemCbs, function (c) { return c.checked; });
        allCb.checked = allChecked;
      };
    });
  }

  // 지역 × 클래스 행렬 반환 — 선택된 클래스만 포함
  function buildMatrix() {
    var jobId = getSelectedJobId();
    var enabled = getEnabledClassKeys();
    var classes = getCurrentClasses();
    var jobByRegion = JOB_DATA[jobId] || {};
    return REGIONS.map(function (r) {
      var row = { region: r, values: {}, total: 0 };
      var jr = jobByRegion[r] || {};
      classes.forEach(function (c) {
        if (enabled.indexOf(c.key) === -1) { row.values[c.key] = 0; return; }
        var v = jr[c.key] || 0;
        row.values[c.key] = v;
        row.total += v;
      });
      return row;
    });
  }

  function formatInt(n) {
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  // ── 차트 (ECharts) ───────────────────────────────────────
  var chart = null;
  function renderChart(matrix) {
    var el = document.getElementById('stats-chart');
    var enabled = getEnabledClassKeys();
    var classes = getCurrentClasses();
    var visibleClasses = classes.filter(function (c) { return enabled.indexOf(c.key) !== -1; });
    if (!chart) { chart = echarts.init(el); }
    chart.setOption({
      color: visibleClasses.map(function (c) { return c.color; }),
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        textStyle: { fontFamily: 'Noto Sans KR, Inter, sans-serif', fontSize: 12 },
        valueFormatter: function (v) { return formatInt(v) + ' ㎡'; }
      },
      legend: {
        data: visibleClasses.map(function (c) { return c.label; }),
        bottom: 4,
        textStyle: { fontFamily: 'Noto Sans KR, Inter, sans-serif', fontSize: 11 }
      },
      grid: { left: 64, right: 24, top: 48, bottom: 72 },
      xAxis: {
        type: 'category',
        data: REGIONS,
        axisLabel: {
          fontFamily: 'Noto Sans KR, Inter, sans-serif',
          fontSize: 10,
          interval: 0,
          rotate: 50
        },
        axisTick: { alignWithLabel: true }
      },
      yAxis: {
        type: 'value',
        name: '면적(㎡)',
        nameGap: 16,
        nameTextStyle: {
          fontFamily: 'Noto Sans KR, Inter, sans-serif',
          fontSize: 11,
          color: '#6C757D',
          align: 'left'
        },
        axisLabel: {
          fontFamily: 'Noto Sans KR, Inter, sans-serif',
          fontSize: 10,
          formatter: function (v) { return formatInt(v); }
        },
        splitLine: { lineStyle: { color: 'rgba(0,0,0,0.06)' } }
      },
      series: visibleClasses.map(function (c) {
        return {
          name: c.label,
          type: 'bar',
          stack: 'total',
          emphasis: { focus: 'series' },
          data: matrix.map(function (r) { return r.values[c.key] || 0; })
        };
      })
    }, true);
    chart.resize();
  }

  // ── 표 ───────────────────────────────────────────────────
  function renderTable(matrix) {
    var enabled = getEnabledClassKeys();
    var visibleClasses = getCurrentClasses().filter(function (c) { return enabled.indexOf(c.key) !== -1; });
    var thead = document.querySelector('#stats-table thead');
    var tbody = document.querySelector('#stats-table tbody');
    thead.innerHTML = '<tr>' +
      '<th>지역</th>' +
      '<th class="num">전체 면적(㎡)</th>' +
      visibleClasses.map(function (c) { return '<th class="num">' + c.label + '(㎡)</th>'; }).join('') +
    '</tr>';
    tbody.innerHTML = matrix.map(function (r) {
      return '<tr>' +
        '<td>' + r.region + '</td>' +
        '<td class="num">' + formatInt(r.total) + '</td>' +
        visibleClasses.map(function (c) { return '<td class="num">' + formatInt(r.values[c.key] || 0) + '</td>'; }).join('') +
      '</tr>';
    }).join('');
  }

  // ── 엑셀(CSV) 다운로드 ──────────────────────────────────
  function downloadCsv(matrix) {
    var enabled = getEnabledClassKeys();
    var visibleClasses = getCurrentClasses().filter(function (c) { return enabled.indexOf(c.key) !== -1; });
    var header = ['지역', '전체 면적(㎡)'].concat(visibleClasses.map(function (c) { return c.label + '(㎡)'; }));
    var rows = matrix.map(function (r) {
      return [r.region, r.total].concat(visibleClasses.map(function (c) { return r.values[c.key] || 0; }));
    });
    var csv = [header].concat(rows).map(function (row) {
      return row.map(function (v) {
        var s = String(v);
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',');
    }).join('\n');
    // UTF-8 BOM 추가 — 엑셀에서 한글 깨짐 방지
    var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '조사료_탐지_통계_' + getSelectedJobId() + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ── 이벤트 ───────────────────────────────────────────────
  // 전체 ↔ 개별 클래스 체크박스 동기화 (전체는 고정, 개별은 rebuildClassList 에서 재바인딩)
  document.getElementById('stats-class-all').addEventListener('change', function () {
    var on = this.checked;
    document.querySelectorAll('.stats-class-cb').forEach(function (cb) { cb.checked = on; });
  });

  // AI 분석 과제 변경 — 클래스 리스트 재구성
  document.getElementById('statsTypeSelect').addEventListener('change', function () {
    rebuildClassList();
  });

  // 최초 렌더 — 기본 과제 기준으로 클래스 리스트 주입
  rebuildClassList();

  document.getElementById('stats-reset').addEventListener('click', function () {
    document.getElementById('statsTypeSelect').value = '020411';
    rebuildClassList();
    var firstJob = document.querySelector('input[name="stats-job"]');
    if (firstJob) firstJob.checked = true;
    document.getElementById('stats-empty').hidden = false;
    document.getElementById('stats-result').hidden = true;
    if (chart) { chart.dispose(); chart = null; }
    if (classChart) { classChart.dispose(); classChart = null; }
  });

  // 창 리사이즈 시 차트 너비 재조정
  window.addEventListener('resize', function () {
    if (chart) chart.resize();
    if (classChart) classChart.resize();
  });

  document.getElementById('stats-run').addEventListener('click', function () {
    document.getElementById('stats-empty').hidden = true;
    document.getElementById('stats-result').hidden = false;
    var matrix = buildMatrix();
    renderChart(matrix);
    renderTable(matrix);
  });

  // 탭 전환 — 사용자 정보 열람과 동일한 .history-tab 구조
  document.querySelectorAll('.history-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var tab = btn.dataset.tab;
      document.querySelectorAll('.history-tab').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-region').classList.toggle('hidden', tab !== 'region');
      document.getElementById('panel-class').classList.toggle('hidden', tab !== 'class');
      if (tab === 'class') {
        var matrix = buildMatrix();
        renderClassChart(matrix);
        renderClassTable(matrix);
      }
    });
  });

  // 클래스별 통계 — 클래스를 x축, 면적 합계를 y축으로 막대 차트 + 요약 표 (ECharts)
  var classChart = null;
  function classTotals(matrix) {
    var classes = getCurrentClasses();
    return classes.map(function (c) {
      var sum = 0;
      matrix.forEach(function (r) { sum += r.values[c.key] || 0; });
      return { key: c.key, label: c.label, color: c.color, total: sum };
    });
  }
  function renderClassChart(matrix) {
    var el = document.getElementById('stats-chart-class');
    var totals = classTotals(matrix);
    if (!classChart) { classChart = echarts.init(el); }
    classChart.setOption({
      color: totals.map(function (t) { return t.color; }),
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        textStyle: { fontFamily: 'Noto Sans KR, Inter, sans-serif', fontSize: 12 },
        valueFormatter: function (v) { return formatInt(v) + ' ㎡'; }
      },
      grid: { left: 64, right: 24, top: 24, bottom: 56 },
      xAxis: {
        type: 'category',
        data: totals.map(function (t) { return t.label; }),
        axisLabel: { fontFamily: 'Noto Sans KR, Inter, sans-serif', fontSize: 11, interval: 0 },
        axisTick: { alignWithLabel: true }
      },
      yAxis: {
        type: 'value',
        name: '면적(㎡)',
        nameTextStyle: { fontFamily: 'Noto Sans KR, Inter, sans-serif', fontSize: 11, padding: [0, 0, 6, 0] },
        axisLabel: { fontFamily: 'Noto Sans KR, Inter, sans-serif', fontSize: 10, formatter: function (v) { return formatInt(v); } },
        splitLine: { lineStyle: { color: 'rgba(0,0,0,0.06)' } }
      },
      series: [{
        type: 'bar',
        barMaxWidth: 48,
        barCategoryGap: '40%',
        itemStyle: {
          color: function (p) { return totals[p.dataIndex].color; }
        },
        data: totals.map(function (t) { return t.total; })
      }]
    }, true);
    classChart.resize();
  }
  function renderClassTable(matrix) {
    var totals = classTotals(matrix);
    var grandTotal = totals.reduce(function (a, t) { return a + t.total; }, 0);
    var thead = document.querySelector('#stats-class-table thead');
    var tbody = document.querySelector('#stats-class-table tbody');
    thead.innerHTML = '<tr><th>클래스</th><th class="num">면적(㎡)</th><th class="num">비율(%)</th></tr>';
    tbody.innerHTML = totals.map(function (t) {
      var pct = grandTotal > 0 ? (t.total / grandTotal * 100) : 0;
      return '<tr>' +
        '<td>' + t.label + '</td>' +
        '<td class="num">' + formatInt(t.total) + '</td>' +
        '<td class="num">' + pct.toFixed(1) + '</td>' +
      '</tr>';
    }).join('');
  }

  document.getElementById('stats-excel').addEventListener('click', function () {
    downloadCsv(buildMatrix());
  });

  // ── 더 보기 모달 (분석 결과 찾기) ─────────────────────────
  // 전체 AI 분석 내역 샘플 — 기준 카드보다 많은 목록을 모달에서 검색 가능
  var MODAL_ITEMS = [
    { id: 'FG03', date: '2025.04.29', orthoName: '남원_운봉읍_4월',   scopeType: '사료작물 정보', scopeName: '사료작물(동계)_운봉읍', analysis: '생육기',                                         task: '사료작물(생육기) 탐지' },
    { id: 'FG02', date: '2025.08.30', orthoName: '남원시_사매면_8월', scopeType: '사료작물 정보', scopeName: '사료작물(하계)_사매면', analysis: '(교육용)사료작물(수단그라스,옥수수) 생육기 분석', task: '사료작물(생육기) 탐지' },
    { id: 'FG01', date: '2025.04.29', orthoName: '남원_운봉읍_4월',   scopeType: '사료작물 정보', scopeName: '사료작물(동계)_운봉읍', analysis: '(교육용)사료작물(IRG,호밀) 생육기 분석_운봉…',     task: '사료작물(생육기) 탐지' }
  ];

  function openSearchModal() {
    var backdrop = document.getElementById('stats-search-modal');
    backdrop.classList.add('show');
    renderModalTable();
  }
  function closeSearchModal() {
    document.getElementById('stats-search-modal').classList.remove('show');
  }

  function renderModalTable() {
    var tbody = document.querySelector('#stats-search-tbody');
    if (!tbody) return;
    var currentId = getSelectedJobId();
    tbody.innerHTML = MODAL_ITEMS.map(function (r) {
      var checked = r.id === currentId ? ' checked' : '';
      return '<tr>' +
        '<td class="num"><input type="radio" name="modal-job" value="' + r.id + '" class="form-radio"' + checked + '></td>' +
        '<td class="num">' + r.date + '</td>' +
        '<td>' + r.orthoName + '</td>' +
        '<td>' + r.scopeType + '</td>' +
        '<td>' + r.scopeName + '</td>' +
        '<td>' + r.analysis + '</td>' +
        '<td>' + r.task + '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('stats-search-count').innerHTML = '총 <strong>' + MODAL_ITEMS.length + '</strong>건 중 1~' + MODAL_ITEMS.length + '행';
  }

  document.getElementById('stats-more').addEventListener('click', openSearchModal);
  document.getElementById('stats-search-close').addEventListener('click', closeSearchModal);
  document.getElementById('stats-search-cancel').addEventListener('click', closeSearchModal);
  document.getElementById('stats-search-confirm').addEventListener('click', function () {
    var sel = document.querySelector('input[name="modal-job"]:checked');
    if (!sel) { closeSearchModal(); return; }
    // 선택된 모달 항목을 기준 리스트의 해당 라디오에 반영
    var target = document.querySelector('input[name="stats-job"][value="' + sel.value + '"]');
    if (target) target.checked = true;
    closeSearchModal();
  });
  // 백드롭 클릭 닫기
  document.getElementById('stats-search-modal').addEventListener('click', function (e) {
    if (e.target === this) closeSearchModal();
  });
  // ESC 닫기
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('stats-search-modal').classList.contains('show')) {
      closeSearchModal();
    }
  });
})();
</script>
</body>
</html>
