<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - Namwon GeoVision</title>
  <link rel="icon" href="assets/images/favicon_n.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/page-notice.css">
</head>
<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="notice-container">

    <!-- 공통 페이지 헤더 (목록/상세 공통) -->
    <div class="page-header">
      <div class="page-title-wrap">
        <h1>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          <span id="page-title-text">공지사항</span>
        </h1>
        <p id="page-title-sub">Namwon GeoVision 플랫폼 운영 공지 및 업데이트 소식을 확인하세요</p>
      </div>
    </div>

    <!-- 목록 뷰 -->
    <section class="list-view" id="list-view">
      <!-- 검색 툴바 (공용 board-* 스타일) -->
      <div class="board-toolbar">
        <div class="board-field">
          <label for="notice-cat">구분</label>
          <select class="board-search-select" id="notice-cat">
            <option value="all">전체</option>
            <option value="urgent">긴급</option>
            <option value="general">일반</option>
            <option value="work">업무</option>
          </select>
        </div>
        <div class="board-field board-field--grow">
          <label for="search-input">검색어</label>
          <div class="board-field-row">
            <input type="text" class="board-search-input" id="search-input" placeholder="제목 또는 내용 검색">
          </div>
        </div>
        <div class="board-toolbar-actions">
          <button type="button" class="btn btn-secondary" id="notice-reset">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            초기화
          </button>
          <button type="button" class="btn btn-accent" id="notice-search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            검색
          </button>
        </div>
      </div>

      <div class="notice-card">
        <table class="notice-table">
          <thead>
            <tr>
              <th class="col-category">구분</th>
              <th>제목</th>
              <th class="col-date">등록일</th>
            </tr>
          </thead>
          <tbody id="notice-tbody"></tbody>
        </table>
      </div>

      <div id="empty-state-wrap"></div>

      <div class="board-paginator">
        <button type="button" class="board-page-btn" id="notice-first">처음</button>
        <button type="button" class="board-page-btn" id="notice-prev">이전</button>
        <div class="board-page-pages" id="notice-pages"></div>
        <button type="button" class="board-page-btn" id="notice-next">다음</button>
        <button type="button" class="board-page-btn" id="notice-last">마지막</button>
        <div class="board-page-size-wrap">
          <select class="board-page-size" id="notice-page-size">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
          <span>페이지 크기</span>
        </div>
        <div class="board-count" id="notice-count">총 <strong>0</strong>건 중 0~0행</div>
      </div>
    </section>

    <!-- 상세 뷰 (페이지 전환 형태) -->
    <section class="detail-view" id="detail-view">
      <div class="detail-card">
        <div class="detail-header">
          <h2 id="dv-title">공지사항</h2>
          <div class="detail-meta">
            <span class="notice-cat" id="dv-cat">일반</span>
            <span class="meta-date" id="dv-date">-</span>
          </div>
        </div>
        <div class="detail-content" id="dv-content"></div>
        <div class="detail-attach" id="dv-attach" hidden>
          <div class="attach-title">첨부 파일</div>
          <div id="dv-attach-list"></div>
        </div>
      </div>

      <div class="detail-foot">
        <button type="button" class="detail-list-btn" id="detail-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          목록
        </button>
      </div>
    </section>

  </div>

  <div id="footer-include"></div>
</div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/policy-modal.js"></script>
<script>
(function () {
  'use strict';

  // ── 샘플 공지 데이터 (Namwon GeoVision 플랫폼 기준) ──
  var NOTICES = [
    {
      id: 8,
      category: 'urgent',
      title: '고위험 탐지 건 긴급 처리 안내',
      date: '2026-04-15',
      pinned: true,
      new: true,
      content:
        '최근 지도 대시보드에서 확인되는 고위험 탐지 건수가 지난 주 대비 12% 증가했습니다.\n' +
        '도로 관리 담당자께서는 아래 절차에 따라 신속히 처리해 주시기 바랍니다.\n\n' +
        '1) 이력 관리 메뉴 > 고위험 필터 선택\n' +
        '2) 현장 확인 후 탐지 정보 모달에서 처리 상태 변경\n' +
        '3) 조치 메모에 조치 내용 입력 후 저장\n\n' +
        '긴급 문의: 도로관리과 내선 102',
      attachments: [
        { name: '고위험_처리_지침_v1.pdf', size: '1.2MB' }
      ]
    },
    {
      id: 7,
      category: 'work',
      title: '정사영상 AI 모델 v2.1 배포 완료',
      date: '2026-04-14',
      pinned: true,
      new: true,
      content:
        'YOLOv8-Road-Ortho 모델이 v2.1 로 업데이트되었습니다.\n\n' +
        '주요 개선 사항:\n' +
        '· 포트홀 탐지 정확도 mAP 0.83 → 0.87 (+4%)\n' +
        '· 크랙 세부 유형 분리 (세로/가로/거북등)\n' +
        '· 쓰레기·공동 의심 클래스 오탐률 감소\n\n' +
        '기존 분석 작업에는 영향이 없으며, 새로 실행하는 분석부터 적용됩니다.',
      attachments: [
        { name: 'v2.1_release_notes.pdf', size: '860KB' },
        { name: 'benchmark_report.xlsx', size: '320KB' }
      ]
    },
    {
      id: 6,
      category: 'work',
      title: '카메라 AI 추론 신규 클래스 2종 추가',
      date: '2026-04-10',
      pinned: false,
      new: true,
      content:
        '차량 카메라 기반 추론 모델에 다음 2개 클래스가 추가되었습니다.\n\n' +
        '· 컬러 맨홀 (Color_Manhole) — 미끄럼 사고 예방 대상 식별\n' +
        '· 불법 주정차 (Illegal_Parking) — 교통 흐름 방해 차량 탐지\n\n' +
        '분석 실행 메뉴에서 모델 버전을 선택해 사용할 수 있습니다.',
      attachments: []
    },
    {
      id: 5,
      category: 'work',
      title: '시스템 정기점검 안내 (2026.04.20 02:00 ~ 04:00)',
      date: '2026-04-08',
      pinned: false,
      new: false,
      content:
        '안정적인 서비스 제공을 위해 아래 일정으로 정기점검을 실시합니다.\n\n' +
        '· 점검 일시: 2026.04.20 (월) 02:00 ~ 04:00 (2시간)\n' +
        '· 대상 서비스: 전체 플랫폼 (지도, 분석 실행, 이력 관리, 보고서)\n' +
        '· 점검 중에는 로그인 및 분석 작업이 일시 중단됩니다.\n\n' +
        '이용에 불편을 드려 죄송합니다.',
      attachments: []
    },
    {
      id: 4,
      category: 'work',
      title: '추론 이력 조회 메뉴 개편 — 처리 상태 일괄 관리',
      date: '2026-04-05',
      pinned: false,
      new: false,
      content:
        '추론 이력 조회 메뉴가 개편되었습니다.\n\n' +
        '· 상단 KPI 카드 클릭 시 해당 필터로 바로 이동\n' +
        '· 탐지 정보 모달에서 처리 상태를 직접 변경하고 조치 메모 기록 가능\n' +
        '· 지도 · 대시보드 · 이력 관리 페이지에서 처리 상태가 자동 동기화',
      attachments: []
    },
    {
      id: 3,
      category: 'work',
      title: '보고서 생성 메뉴 PDF 템플릿 개선',
      date: '2026-03-28',
      pinned: false,
      new: false,
      content:
        '월간 / 주간 / 긴급 이슈 보고서 PDF 템플릿의 레이아웃과 차트 가독성이 개선되었습니다.\n' +
        '기간·모델·지역별 필터를 조합해 보다 세분화된 보고서를 생성할 수 있습니다.',
      attachments: [
        { name: 'template_preview.pdf', size: '2.1MB' }
      ]
    },
    {
      id: 2,
      category: 'general',
      title: '지도 검색 성능 개선 및 주소 DB 갱신',
      date: '2026-03-20',
      pinned: false,
      new: false,
      content:
        '지도 서비스의 명칭 / 도로명 / 지번 검색 속도가 개선되었고, 남원시 도로명 주소 데이터베이스가 2026년 3월 기준으로 갱신되었습니다.',
      attachments: []
    },
    {
      id: 1,
      category: 'general',
      title: '개인정보 처리방침 개정 안내',
      date: '2026-03-02',
      pinned: false,
      new: false,
      content:
        '개인정보 보호법 개정에 따라 Namwon GeoVision 플랫폼 개인정보 처리방침이 2026년 3월 15일부로 일부 개정됩니다.\n' +
        '변경된 내용은 첨부 파일을 확인해 주시기 바랍니다.',
      attachments: [
        { name: '개인정보처리방침_개정본.pdf', size: '540KB' }
      ]
    }
  ];

  var CAT_LABEL = {
    urgent: '긴급',
    general: '일반',
    work: '업무'
  };

  var state = {
    cat: 'all',
    keyword: '',
    page: 1,
    pageSize: 10
  };

  function fmtDate(iso) {
    if (!iso) return '';
    return iso.replace(/-/g, '.');
  }

  function getFiltered() {
    var list = NOTICES.slice();
    if (state.cat !== 'all') {
      list = list.filter(function (n) { return n.category === state.cat; });
    }
    if (state.keyword) {
      var kw = state.keyword.toLowerCase();
      list = list.filter(function (n) {
        return n.title.toLowerCase().indexOf(kw) !== -1 ||
          (n.content || '').toLowerCase().indexOf(kw) !== -1;
      });
    }
    // 고정 공지를 최상단으로 정렬하고 나머지는 최신순
    list.sort(function (a, b) {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return b.date.localeCompare(a.date);
    });
    return list;
  }

  function render() {
    var tbody = document.getElementById('notice-tbody');
    var emptyWrap = document.getElementById('empty-state-wrap');
    var countEl = document.getElementById('notice-count');

    var all = getFiltered();
    var total = all.length;

    tbody.innerHTML = '';
    emptyWrap.innerHTML = '';

    if (total === 0) {
      emptyWrap.innerHTML =
        '<div class="empty-state">' +
          '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<p>검색 조건에 맞는 공지사항이 없습니다.</p>' +
        '</div>';
      countEl.innerHTML = '총 <strong>0</strong>건 중 0~0행';
      renderPagination(1);
      return;
    }

    var totalPages = Math.max(1, Math.ceil(total / state.pageSize));
    if (state.page > totalPages) state.page = totalPages;
    var startIdx = (state.page - 1) * state.pageSize;
    var endIdx = Math.min(total, startIdx + state.pageSize);
    var pageItems = all.slice(startIdx, endIdx);

    pageItems.forEach(function (n) {
      var tr = document.createElement('tr');
      if (n.pinned) tr.classList.add('pinned');
      tr.dataset.id = n.id;

      var pinIcon = n.pinned
        ? '<svg class="pin-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-1.5-4.5a2 2 0 01.3-1.9L20 9V5H4v4l2.2 1.6a2 2 0 01.3 1.9L5 17z"/></svg>'
        : '';
      var newBadge = n.new ? '<span class="new-badge">NEW</span>' : '';
      var hasAttach = n.attachments && n.attachments.length;
      var attachIcon = hasAttach
        ? '<svg class="attach-inline-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>'
        : '';

      tr.innerHTML =
        '<td class="col-category"><span class="notice-cat ' + n.category + '">' + CAT_LABEL[n.category] + '</span></td>' +
        '<td>' +
          '<div class="notice-title-cell">' +
            pinIcon +
            '<span class="title-txt">' + escapeHtml(n.title) + '</span>' +
            newBadge +
            attachIcon +
          '</div>' +
        '</td>' +
        '<td class="col-date">' + fmtDate(n.date) + '</td>';

      tr.addEventListener('click', function () { openDetail(n); });
      tbody.appendChild(tr);
    });

    countEl.innerHTML = '총 <strong>' + total + '</strong>건 중 ' + (startIdx + 1) + '~' + endIdx + '행';
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    var pagesEl = document.getElementById('notice-pages');
    pagesEl.innerHTML = '';
    var first = document.getElementById('notice-first');
    var prev = document.getElementById('notice-prev');
    var next = document.getElementById('notice-next');
    var last = document.getElementById('notice-last');
    first.disabled = prev.disabled = state.page <= 1;
    next.disabled = last.disabled = state.page >= totalPages;
    // 현재 페이지 주변 최대 5개 번호 표시
    var start = Math.max(1, state.page - 2);
    var end = Math.min(totalPages, start + 4);
    start = Math.max(1, end - 4);
    for (var p = start; p <= end; p++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'board-page-btn' + (p === state.page ? ' active' : '');
      btn.textContent = String(p);
      (function (pg) {
        btn.addEventListener('click', function () { state.page = pg; render(); });
      })(p);
      pagesEl.appendChild(btn);
    }
  }

  function openDetail(n, pushHistory) {
    var sorted = NOTICES.slice().sort(function (a, b) {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return b.date.localeCompare(a.date);
    });
    var idx = sorted.findIndex(function (x) { return x.id === n.id; });

    document.getElementById('dv-title').textContent = n.title;
    var catEl = document.getElementById('dv-cat');
    catEl.textContent = CAT_LABEL[n.category];
    catEl.className = 'notice-cat ' + n.category;
    document.getElementById('dv-date').textContent = '등록일 ' + fmtDate(n.date);
    document.getElementById('dv-content').textContent = n.content || '';

    var attachWrap = document.getElementById('dv-attach');
    var attachList = document.getElementById('dv-attach-list');
    if (n.attachments && n.attachments.length) {
      attachWrap.hidden = false;
      attachList.innerHTML = '';
      n.attachments.forEach(function (a) {
        var item = document.createElement('div');
        item.className = 'attach-item';
        item.innerHTML =
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>' +
          '<span class="attach-name">' + escapeHtml(a.name) + '</span>' +
          '<span class="attach-size">(' + a.size + ')</span>' +
          '<button type="button" class="attach-download" aria-label="다운로드">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            '<span>다운로드</span>' +
          '</button>';
        item.querySelector('.attach-download').addEventListener('click', function (e) {
          e.stopPropagation();
          downloadAttachment(a);
        });
        item.addEventListener('click', function () { downloadAttachment(a); });
        attachList.appendChild(item);
      });
    } else {
      attachWrap.hidden = true;
    }

    document.getElementById('list-view').classList.add('hidden');
    document.getElementById('detail-view').classList.add('active');
    // 뷰 전환에 따른 페이지 타이틀 갱신 — 메뉴명이 아닌 행동 기반.
    document.getElementById('page-title-text').textContent = '공지사항 열람';
    document.getElementById('page-title-sub').textContent = '공지사항 상세 내용을 확인합니다';
    document.title = '공지사항 열람 - Namwon GeoVision';
    document.querySelector('.page-body').scrollTo({ top: 0, behavior: 'auto' });

    if (pushHistory !== false && window.history && window.history.pushState) {
      window.history.pushState({ noticeId: n.id }, '', '?notice=' + n.id);
    }
  }

  function downloadAttachment(a) {
    // 데모 구현: 파일명 그대로 텍스트 Blob 을 생성해 브라우저 다운로드 트리거
    // 실제 구현 시에는 서버의 파일 URL 을 window.location 또는 <a download> 로 연결
    var content = '[샘플 첨부]\n파일명: ' + a.name + '\n크기: ' + a.size + '\n\n' +
      'Namwon GeoVision 공지사항 시스템에서 제공되는 샘플 첨부 파일입니다.\n' +
      '실제 배포본에서는 서버에 저장된 문서가 다운로드됩니다.';
    var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = a.name;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    if (window.NotifyUI) NotifyUI.toast(a.name, '다운로드를 시작합니다');
  }

  function closeDetail(fromPopState) {
    document.getElementById('list-view').classList.remove('hidden');
    document.getElementById('detail-view').classList.remove('active');
    document.getElementById('page-title-text').textContent = '공지사항';
    document.getElementById('page-title-sub').textContent = 'Namwon GeoVision 플랫폼 운영 공지 및 업데이트 소식을 확인하세요';
    document.title = '공지사항 - Namwon GeoVision';
    if (!fromPopState && window.history && window.history.pushState) {
      window.history.pushState({}, '', window.location.pathname);
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // 이벤트 바인딩 — 카테고리 select + 검색 input + 초기화/검색 버튼
  var catSelect = document.getElementById('notice-cat');
  var searchInput = document.getElementById('search-input');
  var pageSize = document.getElementById('notice-page-size');

  function applySearch() {
    state.cat = catSelect.value;
    state.keyword = searchInput.value.trim();
    state.page = 1;
    render();
  }

  document.getElementById('notice-search').addEventListener('click', applySearch);
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') applySearch();
  });
  document.getElementById('notice-reset').addEventListener('click', function () {
    catSelect.value = 'all';
    searchInput.value = '';
    state.cat = 'all';
    state.keyword = '';
    state.page = 1;
    render();
  });

  // 페이지네이션 내비 버튼
  document.getElementById('notice-first').addEventListener('click', function () { state.page = 1; render(); });
  document.getElementById('notice-prev').addEventListener('click', function () {
    if (state.page > 1) { state.page -= 1; render(); }
  });
  document.getElementById('notice-next').addEventListener('click', function () {
    state.page += 1; render();
  });
  document.getElementById('notice-last').addEventListener('click', function () {
    var total = getFiltered().length;
    state.page = Math.max(1, Math.ceil(total / state.pageSize));
    render();
  });
  pageSize.addEventListener('change', function () {
    state.pageSize = parseInt(pageSize.value, 10) || 10;
    state.page = 1;
    render();
  });

  document.getElementById('detail-back').addEventListener('click', function () { closeDetail(); });

  // 브라우저 뒤로가기 지원
  window.addEventListener('popstate', function (e) {
    var st = e.state || {};
    if (st.noticeId) {
      var n = NOTICES.find(function (x) { return x.id === st.noticeId; });
      if (n) { openDetail(n, false); return; }
    }
    closeDetail(true);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('detail-view').classList.contains('active')) {
      closeDetail();
    }
  });

  render();

  // 최초 진입 시 URL ?notice=N 지원
  (function () {
    var params = new URLSearchParams(window.location.search);
    var nid = parseInt(params.get('notice'), 10);
    if (nid) {
      var n = NOTICES.find(function (x) { return x.id === nid; });
      if (n) openDetail(n, false);
    }
  })();
})();
</script>
</body>
</html>
