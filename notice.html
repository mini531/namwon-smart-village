<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - Namwon GeoVision</title>
  <link rel="icon" href="assets/images/favicon_n.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <style>
    html, body { overflow: hidden; }

    .page-body {
      padding-top: var(--header-height);
      height: 100vh;
      background: var(--color-page-bg);
      display: block;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .notice-container {
      width: 100%;
      max-width: 1380px;
      min-width: 0;
      margin: 0 auto;
      padding: 24px 32px 56px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 16px;
    }

    .page-title-wrap h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .page-title-wrap h1 svg { color: var(--color-primary); }

    .page-title-wrap p {
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .toolbar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-lg);
      padding: 16px 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .tab-strip {
      display: flex;
      gap: 4px;
      background: var(--color-surface-2);
      border-radius: 8px;
      padding: 4px;
    }

    .tab-strip button {
      padding: 8px 14px;
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-muted);
      cursor: pointer;
      border-radius: 6px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .tab-strip button:hover { color: var(--color-text); }

    .tab-strip button.active {
      background: var(--color-surface);
      color: var(--color-primary);
      box-shadow: 0 1px 3px rgba(15, 37, 64, 0.08);
    }

    .search-group {
      position: relative;
      margin-left: auto;
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 240px;
      max-width: 380px;
    }

    .search-group svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }

    .search-group input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--border-radius);
      font-size: 13px;
      color: var(--color-text);
      outline: none;
      background: var(--color-surface);
      font-family: inherit;
    }

    .search-group input:focus { border-color: var(--color-primary); }

    .notice-count {
      font-size: 13px;
      color: var(--color-text-muted);
      font-weight: 600;
      white-space: nowrap;
    }
    .notice-count strong { color: var(--color-primary); }

    /* 공지 테이블 */
    .notice-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
    }

    .notice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .notice-table thead th {
      background: var(--color-surface-2);
      color: var(--color-text-muted);
      padding: 14px 18px;
      text-align: left;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 1px solid var(--color-border);
    }

    .notice-table thead th.col-category { width: 120px; text-align: center; }
    .notice-table thead th.col-date { width: 130px; text-align: center; }

    .notice-table tbody tr {
      border-bottom: 1px solid #F1F3F5;
      cursor: pointer;
      transition: background 0.12s;
    }

    .notice-table tbody tr:last-child { border-bottom: none; }
    .notice-table tbody tr:hover { background: #FAFBFC; }

    .notice-table tbody td {
      padding: 14px 18px;
      color: var(--color-text);
      vertical-align: middle;
    }

    .notice-table tbody td.col-date {
      text-align: right;
      font-size: 13px;
      color: var(--color-text-muted);
      padding-right: 22px;
    }

    .notice-table tr.pinned {
      background: #FFF8F9;
    }
    .notice-table tr.pinned:hover { background: #FFEEF1; }

    .notice-cat {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      letter-spacing: -0.2px;
    }
    .notice-cat.important {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: #FBEEF0;
    }

    .notice-title-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .notice-title-cell .title-txt {
      font-weight: 700;
      color: var(--color-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .notice-title-cell .pin-icon {
      color: var(--color-primary);
      flex-shrink: 0;
    }
    .notice-title-cell .new-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      background: var(--color-primary);
      padding: 1px 6px;
      border-radius: 3px;
      letter-spacing: 0.3px;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--color-text-muted);
    }
    .empty-state svg { opacity: 0.35; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* 페이지네이션은 전역 .pagination / .page-btn 사용 */
    .pagination { margin-top: 22px; min-height: 34px; }
    .page-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: var(--color-surface);
      color: var(--color-text-muted);
      border-color: var(--color-border);
    }

    /* 상세 페이지 뷰 (모달 아님 — 페이지 전환) */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view.hidden { display: none; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      color: var(--color-text);
      border-radius: var(--border-radius);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 18px;
      transition: all 0.15s;
    }
    .detail-back:hover { border-color: var(--color-primary); color: var(--color-primary); }

    .detail-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-lg);
      padding: 32px 36px 36px;
    }

    .detail-header {
      padding-bottom: 20px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 26px;
    }
    .detail-header h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--color-text);
      letter-spacing: -0.3px;
      line-height: 1.35;
      margin-bottom: 14px;
    }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .detail-meta .meta-date {
      font-size: 13px;
      color: var(--color-text-muted);
      font-weight: 600;
    }

    .detail-content {
      font-size: 15px;
      line-height: 1.85;
      color: var(--color-text);
      white-space: pre-line;
      min-height: 200px;
    }

    .detail-attach {
      margin-top: 32px;
      padding-top: 22px;
      border-top: 1px solid var(--color-border);
    }
    .detail-attach .attach-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 12px;
    }
    .detail-attach .attach-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      font-size: 13px;
      color: var(--color-text);
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .detail-attach .attach-item:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .detail-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 8px;
    }
    .detail-nav button {
      padding: 10px 16px;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--border-radius);
      color: var(--color-text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .detail-nav button:hover:not(:disabled) { border-color: var(--color-primary); color: var(--color-primary); }
    .detail-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 720px) {
      .notice-container { padding: 18px 14px 40px; }
      .toolbar { padding: 12px 14px; }
      .search-group { width: 100%; max-width: none; margin-left: 0; }
      .page-title-wrap h1 { font-size: 20px; }
      .notice-table thead th.col-category,
      .notice-table tbody td.col-category { display: none; }
      .notice-table tbody td { padding: 12px 14px; }
      .notice-table thead th { padding: 12px 14px; }
      .notice-table thead th.col-date,
      .notice-table tbody td.col-date { padding-right: 14px; width: 90px; }
    }
  </style>
</head>
<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="notice-container">

    <!-- 목록 뷰 -->
    <section class="list-view" id="list-view">
      <div class="page-header">
        <div class="page-title-wrap">
          <h1>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            공지사항
          </h1>
          <p>Namwon GeoVision 플랫폼 운영 공지 및 업데이트 소식을 확인하세요</p>
        </div>
      </div>

      <div class="toolbar">
        <div class="tab-strip" id="tab-strip">
          <button type="button" class="active" data-cat="all">전체</button>
          <button type="button" data-cat="important">중요</button>
          <button type="button" data-cat="general">일반</button>
          <button type="button" data-cat="maintenance">점검</button>
          <button type="button" data-cat="update">업데이트</button>
        </div>
        <div class="search-group">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="제목 또는 내용 검색">
        </div>
        <div class="notice-count" id="notice-count">총 <strong>0</strong>건</div>
      </div>

      <div class="notice-card">
        <table class="notice-table">
          <thead>
            <tr>
              <th class="col-category">구분</th>
              <th>제목</th>
              <th class="col-date">등록일</th>
            </tr>
          </thead>
          <tbody id="notice-tbody"></tbody>
        </table>
      </div>

      <div id="empty-state-wrap"></div>
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- 상세 뷰 (페이지 전환 형태) -->
    <section class="detail-view" id="detail-view">
      <button type="button" class="detail-back" id="detail-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        목록으로
      </button>

      <div class="detail-card">
        <div class="detail-header">
          <h2 id="dv-title">공지사항</h2>
          <div class="detail-meta">
            <span class="notice-cat" id="dv-cat">일반</span>
            <span class="meta-date" id="dv-date">-</span>
          </div>
        </div>
        <div class="detail-content" id="dv-content"></div>
        <div class="detail-attach" id="dv-attach" style="display:none;">
          <div class="attach-title">첨부 파일</div>
          <div id="dv-attach-list"></div>
        </div>
      </div>

      <div class="detail-nav">
        <button type="button" id="dv-prev">← 이전 글</button>
        <button type="button" id="dv-next">다음 글 →</button>
      </div>
    </section>

  </div>

  <div id="footer-include"></div>
</div>

<script src="assets/js/layout.js"></script>

    var list = NOTICES.slice();
    if (state.cat !== 'all') {
      list = list.filter(function (n) { return n.category === state.cat; });
    }
    if (state.keyword) {
      var kw = state.keyword.toLowerCase();
      list = list.filter(function (n) {
        return n.title.toLowerCase().indexOf(kw) !== -1 ||
          (n.content || '').toLowerCase().indexOf(kw) !== -1;
      });
    }
    // 고정 공지를 최상단으로 정렬하고 나머지는 최신순
    list.sort(function (a, b) {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return b.date.localeCompare(a.date);
    });
    return list;
  }

  function render() {
    var tbody = document.getElementById('notice-tbody');
    var emptyWrap = document.getElementById('empty-state-wrap');
    var countEl = document.getElementById('notice-count');

    var all = getFiltered();
    countEl.innerHTML = '총 <strong>' + all.length + '</strong>건';

    tbody.innerHTML = '';
    emptyWrap.innerHTML = '';

    if (all.length === 0) {
      emptyWrap.innerHTML =
        '<div class="empty-state">' +
          '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<p>검색 조건에 맞는 공지사항이 없습니다.</p>' +
        '</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    var totalPages = Math.max(1, Math.ceil(all.length / state.pageSize));
    if (state.page > totalPages) state.page = totalPages;
    var startIdx = (state.page - 1) * state.pageSize;
    var pageItems = all.slice(startIdx, startIdx + state.pageSize);

    pageItems.forEach(function (n) {
      var tr = document.createElement('tr');
      if (n.pinned) tr.classList.add('pinned');
      tr.dataset.id = n.id;

      var pinIcon = n.pinned
        ? '<svg class="pin-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-1.5-4.5a2 2 0 01.3-1.9L20 9V5H4v4l2.2 1.6a2 2 0 01.3 1.9L5 17z"/></svg>'
        : '';
      var newBadge = n.new ? '<span class="new-badge">NEW</span>' : '';

      tr.innerHTML =
        '<td class="col-category"><span class="notice-cat ' + n.category + '">' + CAT_LABEL[n.category] + '</span></td>' +
        '<td>' +
          '<div class="notice-title-cell">' +
            pinIcon +
            '<span class="title-txt">' + escapeHtml(n.title) + '</span>' +
            newBadge +
          '</div>' +
        '</td>' +
        '<td class="col-date">' + fmtDate(n.date) + '</td>';

      tr.addEventListener('click', function () { openDetail(n); });
      tbody.appendChild(tr);
    });

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    var cont = document.getElementById('pagination');
    cont.innerHTML = '';

    function mkBtn(label, page, opts) {
      opts = opts || {};
      var b = document.createElement('button');
      b.className = 'page-btn';
      if (opts.active) b.classList.add('active');
      b.textContent = label;
      if (opts.disabled) b.disabled = true;
      else b.addEventListener('click', function () {
        state.page = page;
        render();
      });
      cont.appendChild(b);
    }

    mkBtn('‹', state.page - 1, { disabled: state.page <= 1 });
    for (var p = 1; p <= Math.max(1, totalPages); p++) {
      mkBtn(String(p), p, { active: p === state.page });
    }
    mkBtn('›', state.page + 1, { disabled: state.page >= totalPages });
  }

  function openDetail(n, pushHistory) {
    var sorted = NOTICES.slice().sort(function (a, b) {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return b.date.localeCompare(a.date);
    });
    var idx = sorted.findIndex(function (x) { return x.id === n.id; });

    document.getElementById('dv-title').textContent = n.title;
    var catEl = document.getElementById('dv-cat');
    catEl.textContent = CAT_LABEL[n.category];
    catEl.className = 'notice-cat ' + n.category;
    document.getElementById('dv-date').textContent = '등록일 ' + fmtDate(n.date);
    document.getElementById('dv-content').textContent = n.content || '';

    var attachWrap = document.getElementById('dv-attach');
    var attachList = document.getElementById('dv-attach-list');
    if (n.attachments && n.attachments.length) {
      attachWrap.style.display = 'block';
      attachList.innerHTML = n.attachments.map(function (a) {
        return '<div class="attach-item">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
          escapeHtml(a.name) + ' <span style="color:var(--color-text-muted);font-weight:600;">(' + a.size + ')</span>' +
        '</div>';
      }).join('');
    } else {
      attachWrap.style.display = 'none';
    }

    var prevBtn = document.getElementById('dv-prev');
    var nextBtn = document.getElementById('dv-next');
    prevBtn.disabled = idx <= 0;
    nextBtn.disabled = idx >= sorted.length - 1;
    prevBtn.onclick = function () { if (idx > 0) openDetail(sorted[idx - 1], true); };
    nextBtn.onclick = function () { if (idx < sorted.length - 1) openDetail(sorted[idx + 1], true); };

    document.getElementById('list-view').classList.add('hidden');
    document.getElementById('detail-view').classList.add('active');
    document.querySelector('.page-body').scrollTo({ top: 0, behavior: 'auto' });

    if (pushHistory !== false && window.history && window.history.pushState) {
      window.history.pushState({ noticeId: n.id }, '', '?notice=' + n.id);
    }
  }

  function closeDetail(fromPopState) {
    document.getElementById('list-view').classList.remove('hidden');
    document.getElementById('detail-view').classList.remove('active');
    if (!fromPopState && window.history && window.history.pushState) {
      window.history.pushState({}, '', window.location.pathname);
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // 이벤트 바인딩
  document.getElementById('tab-strip').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-cat]');
    if (!btn) return;
    document.querySelectorAll('#tab-strip button').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    state.cat = btn.dataset.cat;
    state.page = 1;
    render();
  });

  var searchInput = document.getElementById('search-input');
  var searchTimer = null;
  searchInput.addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
      state.keyword = searchInput.value.trim();
      state.page = 1;
      render();
    }, 180);
  });

  document.getElementById('detail-back').addEventListener('click', function () { closeDetail(); });

  // 브라우저 뒤로가기 지원
  window.addEventListener('popstate', function (e) {
    var st = e.state || {};
    if (st.noticeId) {
      var n = NOTICES.find(function (x) { return x.id === st.noticeId; });
      if (n) { openDetail(n, false); return; }
    }
    closeDetail(true);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('detail-view').classList.contains('active')) {
      closeDetail();
    }
  });

  render();

  // 최초 진입 시 URL ?notice=N 지원
  (function () {
    var params = new URLSearchParams(window.location.search);
    var nid = parseInt(params.get('notice'), 10);
    if (nid) {
      var n = NOTICES.find(function (x) { return x.id === nid; });
      if (n) openDetail(n, false);
    }
  })();
})();
</script>
</body>
</html>
