<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 분석 - Land-XI</title>
  <link rel="icon" href="assets/images/favicon_landxi.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/page-analysis-ai.css">
</head>
<body>

<div id="header-include"></div>

<div class="page-body page-body--no-scroll">
  <div class="ai-layout">

    <!-- 좌측 설정 사이드바 -->
    <aside class="ai-side">
      <div class="ai-side-header">
        <div class="ai-side-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          분석 설정
        </div>
      </div>

      <div class="ai-side-body">
        <!-- 1. 분석 과제 -->
        <div class="ai-pick-card" id="pick-task" data-pick="task">
          <div class="ai-pick-head">
            <span class="ai-pick-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              분석 과제
            </span>
            <span class="ai-pick-meta" id="pick-task-meta">분석 과제 선택</span>
          </div>
          <div class="ai-pick-value" id="pick-task-value">분석 과제를 선택해 주세요</div>
        </div>

        <!-- 2. 영상 -->
        <div class="ai-pick-card" id="pick-video" data-pick="video">
          <div class="ai-pick-head">
            <span class="ai-pick-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              영상
            </span>
            <span class="ai-pick-meta" id="pick-video-meta">아카이브</span>
          </div>
          <div class="ai-pick-value" id="pick-video-value">영상을 선택해 주세요</div>
        </div>

        <!-- 3. 범위 -->
        <div class="ai-pick-card" id="pick-range" data-pick="range">
          <div class="ai-pick-head">
            <span class="ai-pick-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              범위
            </span>
            <span class="ai-pick-meta" id="pick-range-meta">추론 범위 방식</span>
          </div>
          <div class="ai-pick-value" id="pick-range-value">추론 범위를 선택해 주세요</div>
        </div>

        <!-- 4. 필지 (범위가 '필지 기반' 일 때만 노출) -->
        <div class="ai-pick-card" id="pick-parcel" data-pick="parcel" hidden>
          <div class="ai-pick-head">
            <span class="ai-pick-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              필지
            </span>
            <span class="ai-pick-meta" id="pick-parcel-meta">데이터셋 선택</span>
          </div>
          <div class="ai-pick-value" id="pick-parcel-value">필지를 선택해 주세요</div>
        </div>
      </div>

      <div class="ai-side-foot">
        <button type="button" class="btn btn-primary btn-cta" id="ai-run-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          분석 실행
        </button>
      </div>
    </aside>

    <!-- 인라인 패널 (사이드바 옆, 카드 클릭 시 표시) -->
    <aside class="ai-panel" id="ai-panel" aria-hidden="true">
      <div class="ai-panel-head">
        <div class="ai-panel-title" id="ai-panel-title"></div>
        <button type="button" class="ai-panel-close" id="ai-panel-close" aria-label="패널 닫기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="ai-panel-body" id="ai-panel-body"></div>
      <div class="ai-panel-foot" id="ai-panel-foot" hidden></div>
    </aside>

    <!-- 지도 (no-result-panel 클래스 → 우측 도구·줌이 14px 우측 끝에 정렬됨) -->
    <div class="map-wrapper no-result-panel">
      <div id="ai-map" class="ai-map"></div>
      <div id="map-popup" class="ol-popup" hidden></div>

      <!-- 분석 진행 오버레이 (분석 실행 시 노출, 보안서약서 패턴 따름) -->
      <div class="ai-progress-overlay" id="ai-progress-overlay" hidden>
        <div class="ai-progress-box">
          <div class="ai-progress-head">
            <div class="ai-progress-title" id="ai-progress-title">분석 진행 중</div>
            <div class="ai-progress-pct"><span id="ai-progress-stage">추론중</span> <strong id="ai-progress-pct">0%</strong></div>
          </div>
          <div class="ai-progress-body">
            <div class="ai-progress-bar"><div class="ai-progress-bar-fill" id="ai-progress-fill"></div></div>
            <dl class="ai-progress-meta">
              <div class="ai-progress-row"><dt>필지 진행</dt><dd id="ai-progress-parcel">0 / 0</dd></div>
              <div class="ai-progress-row"><dt>시작 시간</dt><dd id="ai-progress-start">-</dd></div>
              <div class="ai-progress-row"><dt>예상 완료</dt><dd id="ai-progress-end">-</dd></div>
              <div class="ai-progress-row"><dt>예상 잔여</dt><dd id="ai-progress-remain">-</dd></div>
            </dl>
            <p class="ai-progress-note">평균 24시간 소요 · 완료 시 메일/대시보드로 알림</p>
          </div>
          <div class="ai-progress-foot">
            <button type="button" class="btn btn-secondary btn-cta" id="ai-restart-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
              새로 분석하기
            </button>
            <a href="history.html" class="btn btn-primary btn-cta">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              분석 결과 보기
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/map.js"></script>
<script src="assets/js/page-analysis-ai.js"></script>
</body>
</html>
