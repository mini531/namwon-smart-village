<!DOCTYPE html>
<html lang="ko">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">

<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="usecase-container">

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div class="page-title-wrap">
        <h1>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span id="page-title-text">활용 사례</span>
        </h1>
        <p id="page-title-sub">실제 현장에서 활용된 사례를 확인하세요</p>
      </div>
    </div>

    <!-- 목록 뷰 -->
    <section class="uc-list-view" id="list-view">
      <!-- 검색 툴바 (공용 board-* 스타일) -->
      <div class="board-toolbar">
        <div class="board-field board-field--grow">
          <label for="uc-search-field">검색어</label>
          <div class="board-field-row">
            <select class="board-search-select" id="uc-search-field">
              <option value="all">전체</option>
              <option value="title">제목</option>
              <option value="content">내용</option>
            </select>
            <input type="text" class="board-search-input" id="uc-search-input" placeholder="검색어">
          </div>
        </div>
        <div class="board-toolbar-actions">
          <button type="button" class="btn btn-secondary" id="uc-reset">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            초기화
          </button>
          <button type="button" class="btn btn-accent" id="uc-search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            검색
          </button>
        </div>
      </div>

      <div class="uc-card">
        <div class="uc-card-head">활용사례 목록</div>
        <table class="uc-table">
          <thead>
            <tr>
              <th>제목</th>
            </tr>
          </thead>
          <tbody id="uc-tbody"></tbody>
        </table>
        <div id="uc-empty-wrap"></div>
        <div class="board-paginator board-paginator--embedded">
          <button type="button" class="board-page-btn" id="uc-first">처음</button>
          <button type="button" class="board-page-btn" id="uc-prev">이전</button>
          <div class="board-page-pages" id="uc-pages"></div>
          <button type="button" class="board-page-btn" id="uc-next">다음</button>
          <button type="button" class="board-page-btn" id="uc-last">마지막</button>
          <div class="board-page-size-wrap">
            <select class="board-page-size" id="uc-page-size">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
            <span>페이지 크기</span>
          </div>
          <div class="board-count" id="uc-count">총 <strong>0</strong>건 중 0~0행</div>
        </div>
      </div>
    </section>

    <!-- 상세 뷰 (페이지 전환) -->
    <section class="uc-detail-view" id="detail-view">

        <div class="uc-detail-content" id="dv-content"></div>
        <div class="uc-detail-attach" id="dv-attach" hidden>
          <div class="attach-title">첨부 파일</div>
          <div id="dv-attach-list"></div>
        </div>
      </div>

      <div class="uc-detail-foot">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

  <div id="footer-include"></div>
</div>

      attachments: [
        { name: '도로안전_AI탐지_실증보고서_v1.0.pdf', size: '3.4MB' },

    {

        '1. 주요 문제점\n' +

        '사료작물 관리 서비스: 조사료 재배면적 및 생산량 자동 검출\n' +
        '농지이용 관리 서비스: 필지 단위 재배(경작, 휴경) 자동 검출\n' +
        '영농시설 관리 서비스: 비닐하우스(단동, 연동) 등 영농시설 유형·규모 자동 검출\n' +

        '[보도자료] 스마트 영농 관리 서비스 \'농뷰(Nong-View)\' 구축, 예산 절감 효과\n' +
        '지역본부에서도 이 사례를 통해 타지자체 사업 제안 등 신규 사업 발굴에 많은 활용 부탁드립니다.\n\n' +

        '다음 사례는 Land-XI 플랫폼을 통해 남원시의 생활환경 관리 서비스를 제공했던 내용으로 돌아오겠습니다~!\n\n' +

    }
  ];

  var state = {
    field: 'all',   // all | title | content
    keyword: '',
    page: 1,
    pageSize: 10
  };

  function fmtDateTime(iso) {
    if (!iso) return '';
    return iso.replace('T', ' ').replace(/-/g, '.').substring(0, 19);
  }

  function getFiltered() {
    var list = USECASES.slice();
    if (state.keyword) {
      var kw = state.keyword.toLowerCase();
      list = list.filter(function (u) {
        if (state.field === 'title') return u.title.toLowerCase().indexOf(kw) !== -1;
        if (state.field === 'content') return (u.content || '').toLowerCase().indexOf(kw) !== -1;
        // all
        return u.title.toLowerCase().indexOf(kw) !== -1 ||
          (u.content || '').toLowerCase().indexOf(kw) !== -1;
      });
    }
    // 최신순
    list.sort(function (a, b) { return b.date.localeCompare(a.date); });
    return list;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function linkifyUrls(text) {
    // http(s) URL을 <a>로 감싸기 (escape 후 호출 — 이미 안전)
    return text.replace(/(https?:\/\/[^\s<]+)/g, function (m) {
      return '<a href="' + m + '" target="_blank" rel="noopener">' + m + '</a>';
    });
  }

  function render() {
    var tbody = document.getElementById('uc-tbody');
    var emptyWrap = document.getElementById('uc-empty-wrap');
    var countEl = document.getElementById('uc-count');

    var all = getFiltered();
    var total = all.length;

    tbody.innerHTML = '';
    emptyWrap.innerHTML = '';

    if (total === 0) {
      emptyWrap.innerHTML =
        '<div class="uc-empty">' +
          '<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<p>검색 조건에 맞는 활용 사례가 없습니다.</p>' +
        '</div>';
      countEl.innerHTML = '총 <strong>0</strong>건 중 0~0행';
      renderPagination(1);
      return;
    }

    var totalPages = Math.max(1, Math.ceil(total / state.pageSize));
    if (state.page > totalPages) state.page = totalPages;
    var startIdx = (state.page - 1) * state.pageSize;
    var endIdx = Math.min(total, startIdx + state.pageSize);
    var pageItems = all.slice(startIdx, endIdx);

    pageItems.forEach(function (u) {
      var tr = document.createElement('tr');
      tr.dataset.id = u.id;
      var hasAttach = u.attachments && u.attachments.length;
      var attachIcon = hasAttach
        ? '<svg class="uc-attach-inline-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>'
        : '';
      tr.innerHTML = '<td><span class="title-txt">' + escapeHtml(u.title) + '</span>' + attachIcon + '</td>';
      tr.addEventListener('click', function () { openDetail(u); });
      tbody.appendChild(tr);
    });

    countEl.innerHTML = '총 <strong>' + total + '</strong>건 중 ' + (startIdx + 1) + '~' + endIdx + '행';
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    var pagesEl = document.getElementById('uc-pages');
    pagesEl.innerHTML = '';
    var first = document.getElementById('uc-first');
    var prev = document.getElementById('uc-prev');
    var next = document.getElementById('uc-next');
    var last = document.getElementById('uc-last');

    first.disabled = prev.disabled = state.page <= 1;
    next.disabled = last.disabled = state.page >= totalPages;

    // 현재 페이지 주변 최대 5개 번호 표시
    var start = Math.max(1, state.page - 2);
    var end = Math.min(totalPages, start + 4);
    start = Math.max(1, end - 4);
    for (var p = start; p <= end; p++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'board-page-btn' + (p === state.page ? ' active' : '');
      btn.textContent = String(p);
      (function (page) {
        btn.addEventListener('click', function () {
          state.page = page;
          render();
        });
      })(p);
      pagesEl.appendChild(btn);
    }
  }

  function openDetail(u, pushHistory) {
    document.getElementById('dv-title').textContent = u.title;
    document.getElementById('dv-date').textContent = fmtDateTime(u.date);
    var contentEl = document.getElementById('dv-content');
    // 내용 전체 escape 후 URL만 link로 바꾸기
    contentEl.innerHTML = linkifyUrls(escapeHtml(u.content || ''));

    // 첨부 파일 렌더
    var attachWrap = document.getElementById('dv-attach');
    var attachList = document.getElementById('dv-attach-list');
    if (u.attachments && u.attachments.length) {
      attachWrap.hidden = false;
      attachList.innerHTML = '';
      u.attachments.forEach(function (a) {
        var item = document.createElement('div');
        item.className = 'attach-item';
        item.innerHTML =
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>' +
          '<span class="attach-name">' + escapeHtml(a.name) + '</span>' +
          '<span class="attach-size">(' + a.size + ')</span>' +
          '<button type="button" class="attach-download" aria-label="다운로드">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            '<span>다운로드</span>' +
          '</button>';
        item.querySelector('.attach-download').addEventListener('click', function (e) {
          e.stopPropagation();
          downloadAttachment(a);
        });
        item.addEventListener('click', function () { downloadAttachment(a); });
        attachList.appendChild(item);
      });
    } else {
      attachWrap.hidden = true;
    }

    document.getElementById('list-view').classList.add('hidden');
    document.getElementById('detail-view').classList.add('active');
    // 뷰 전환에 따른 페이지 타이틀 갱신 — 메뉴명(단일 '활용 사례') 금지.
    document.getElementById('page-title-text').textContent = '활용 사례 열람';
    document.getElementById('page-title-sub').textContent = '활용 사례 상세 내용을 확인합니다';
    document.title = '활용 사례 열람 - Land-XI';
    document.querySelector('.page-body').scrollTo({ top: 0, behavior: 'auto' });

    if (pushHistory !== false && window.history && window.history.pushState) {
      window.history.pushState({ usecaseId: u.id }, '', '?uc=' + u.id);
    }
  }

  function downloadAttachment(a) {
    // 데모 구현: 실제 배포에서는 서버의 파일 URL로 교체
    var content = '[샘플 첨부]\n파일명: ' + a.name + '\n크기: ' + a.size + '\n\n' +
      'Land-XI 활용 사례 페이지의 샘플 첨부 파일입니다.';
    var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = a.name;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    if (window.NotifyUI) NotifyUI.toast(a.name, '다운로드를 시작합니다');
  }

  function closeDetail(fromPopState) {
    document.getElementById('list-view').classList.remove('hidden');
    document.getElementById('detail-view').classList.remove('active');
    document.getElementById('page-title-text').textContent = '활용 사례';
    document.getElementById('page-title-sub').textContent =
      '실제 현장에서 활용된 사례를 확인하세요';
    document.title = '활용 사례 - Land-XI';
    if (!fromPopState && window.history && window.history.pushState) {
      window.history.pushState({}, '', window.location.pathname);
    }
  }

  // ── 이벤트 바인딩 ──
  var searchInput = document.getElementById('uc-search-input');
  var searchField = document.getElementById('uc-search-field');
  var pageSize = document.getElementById('uc-page-size');

  function applySearch() {
    state.field = searchField.value;
    state.keyword = searchInput.value.trim();
    state.page = 1;
    render();
  }

  document.getElementById('uc-search').addEventListener('click', applySearch);
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') applySearch();
  });
  document.getElementById('uc-reset').addEventListener('click', function () {
    searchInput.value = '';
    searchField.value = 'all';
    state.field = 'all';
    state.keyword = '';
    state.page = 1;
    render();
  });

  document.getElementById('uc-first').addEventListener('click', function () { state.page = 1; render(); });
  document.getElementById('uc-prev').addEventListener('click', function () {
    if (state.page > 1) { state.page -= 1; render(); }
  });
  document.getElementById('uc-next').addEventListener('click', function () {
    state.page += 1; render();
  });
  document.getElementById('uc-last').addEventListener('click', function () {
    var total = getFiltered().length;
    state.page = Math.max(1, Math.ceil(total / state.pageSize));
    render();
  });
  pageSize.addEventListener('change', function () {
    state.pageSize = parseInt(pageSize.value, 10) || 10;
    state.page = 1;
    render();
  });

  document.getElementById('detail-back').addEventListener('click', function () { closeDetail(); });

  window.addEventListener('popstate', function (e) {
    var st = e.state || {};
    if (st.usecaseId) {
      var u = USECASES.find(function (x) { return x.id === st.usecaseId; });
      if (u) { openDetail(u, false); return; }
    }
    closeDetail(true);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('detail-view').classList.contains('active')) {
      closeDetail();
    }
  });

  // 최초 렌더
  render();

  // URL ?uc=N 지원 (직접 링크 진입)
  (function () {
    var params = new URLSearchParams(window.location.search);
    var uid = parseInt(params.get('uc'), 10);
    if (uid) {
      var u = USECASES.find(function (x) { return x.id === uid; });
      if (u) openDetail(u, false);
    }
  })();
})();
</script>
</body>
</html>
