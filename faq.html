<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자주 묻는 질문 - Namwon GeoVision</title>
  <link rel="icon" href="assets/images/favicon_n.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/page-faq.css">
</head>
<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="faq-container">

    <div class="page-header">
      <div class="page-title-wrap">
        <h1>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          자주 묻는 질문
        </h1>
        <p>Namwon GeoVision 사용 중 자주 발생하는 질문과 답변을 확인하세요</p>
      </div>
    </div>

    <!-- 검색 툴바 (공용 board-* 스타일) -->
    <div class="board-toolbar">
      <div class="board-field">
        <label for="faq-cat">구분</label>
        <select class="board-search-select" id="faq-cat">
          <option value="all">전체</option>
          <option value="01">서비스 이용</option>
          <option value="02">데이터 업로드</option>
          <option value="03">분석 서비스</option>
          <option value="04">오류 및 점검</option>
          <option value="05">자료 다운로드</option>
          <option value="06">기타</option>
        </select>
      </div>
      <div class="board-field board-field--grow">
        <label for="search-input">검색어</label>
        <div class="board-field-row">
          <select class="board-search-select" id="faq-search-field">
            <option value="all">전체</option>
            <option value="title">제목</option>
            <option value="content">내용</option>
          </select>
          <input type="text" class="board-search-input" id="search-input" placeholder="검색어">
        </div>
      </div>
      <div class="board-toolbar-actions">
        <button type="button" class="board-btn" id="faq-reset">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          초기화
        </button>
        <button type="button" class="board-btn board-btn--dark" id="faq-search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          검색
        </button>
      </div>
    </div>
    <div class="faq-count-row"><span class="faq-count" id="faq-count">총 <strong>0</strong>개</span></div>

    <div class="faq-list" id="faq-list"></div>
    <div id="empty-state-wrap"></div>
  </div>

  <div id="footer-include"></div>
</div>

<script src="assets/js/layout.js"></script>
<script src="assets/js/policy-modal.js"></script>
<script>
(function () {
  'use strict';

  // ── FAQ 샘플 데이터 (Namwon GeoVision) ──
  // 구분 코드: 01 서비스 이용 · 02 데이터 업로드 · 03 분석 서비스 · 04 오류 및 점검 · 05 자료 다운로드 · 06 기타
  var FAQS = [
    {
      id: 1,
      category: '01',
      q: 'Namwon GeoVision 플랫폼은 어떤 서비스인가요?',
      a: '남원시가 운영하는 AI 기반 도로 안전관리 플랫폼입니다.\n드론 정사영상과 차량 카메라 영상을 AI 모델로 분석해 포트홀·크랙·표지판 파손 등 이상 객체를 자동 탐지하고, 지도 · 이력 · 보고서로 관리합니다.'
    },
    {
      id: 2,
      category: '01',
      q: '사용 권한은 어떻게 부여받나요?',
      a: '도로관리과 담당자를 통해 계정 신청 후 관리자가 승인합니다.\n서비스 지원 > 문의하기 메뉴 또는 내선 102 로 문의해 주시기 바랍니다.'
    },
    {
      id: 3,
      category: '03',
      q: '정사영상과 카메라 분석은 어떻게 다른가요?',
      a: '정사영상 분석은 드론으로 촬영한 넓은 구역의 톱뷰 영상을 대상으로 포트홀 · 크랙 · 쓰레기 · 공동의심 등을 탐지합니다. 광역 점검에 적합합니다.\n\n차량 카메라 분석은 순찰 차량의 전방 카메라 영상에서 포트홀 · 분리대 파손 · 표지판 파손 · 불법 주정차 등을 탐지합니다. 상시 · 구간 중심 점검에 적합합니다.'
    },
    {
      id: 4,
      category: '03',
      q: '분석이 오래 걸리는데 왜 그런가요?',
      a: '정사영상은 한 파일당 50GB 이상이며, 카메라 영상은 수천 프레임을 순차적으로 추론하기 때문에 시간이 소요됩니다.\n지도 홈에서 정사영상 작업 다수를 동시에 선택하면 로드 경고가 표시됩니다. 필요한 작업만 선택해 주세요.'
    },
    {
      id: 5,
      category: '02',
      q: '드론 정사영상은 어떤 형식으로 업로드하나요?',
      a: 'ECW 또는 GeoTIFF 포맷을 지원하며, 파일당 최대 80GB까지 업로드 가능합니다.\n영상 관리 > 신규 업로드 메뉴에서 파일 드롭 또는 선택 후 메타정보(촬영일·지역·해상도)를 입력해 주세요.\n\n대용량 업로드 중 네트워크 중단 시 재개(resume)가 지원됩니다.'
    },
    {
      id: 6,
      category: '01',
      q: '지도에서 처리 상태를 변경하고 싶습니다.',
      a: '지도 우측 "처리 상태" 카드에서 미처리 / 처리중 / 완료 중 원하는 상태를 클릭하면 해당 탐지 목록이 열립니다.\n목록에서 개별 행을 클릭하면 탐지 정보 모달이 열리며, 이곳에서 직접 처리 상태를 변경하고 조치 메모를 기록할 수 있습니다.'
    },
    {
      id: 7,
      category: '01',
      q: '지도 측정 · 그리기 도구 사용법이 궁금합니다.',
      a: '지도 우측 도구 바에서 측정(거리 · 면적 · 반경) 또는 그리기(점 · 선 · 면 · 원)를 선택해 사용할 수 있습니다.\n측정은 클릭으로 지점을 추가하고 더블클릭으로 완료, 그리기는 연속 사용이 가능하며 취소(X) 버튼으로 종료합니다.'
    },
    {
      id: 8,
      category: '05',
      q: '보고서는 어떤 형식으로 제공되나요?',
      a: '월간 정기 / 주간 현황 / 긴급 이슈 3가지 템플릿을 PDF 로 생성할 수 있습니다.\n보고서 생성 메뉴에서 대상 기간 · 모델 · 지역을 선택하면 자동으로 본문이 구성되며, 수정 후 PDF 다운로드 버튼을 누르면 저장됩니다.'
    },
    {
      id: 9,
      category: '05',
      q: '이전에 만든 보고서를 다시 볼 수 있나요?',
      a: '보고서 > 보고서 생성 이력 메뉴에서 저장된 보고서 목록을 확인할 수 있습니다. 카드를 클릭하면 미리보기가 다시 열리고, 삭제도 가능합니다.'
    },
    {
      id: 10,
      category: '06',
      q: '비밀번호를 잊어버렸습니다.',
      a: '로그인 화면의 "비밀번호 재설정" 링크로 임시 비밀번호를 발급받거나, 도로관리과 담당자(내선 102)에게 재설정을 요청해 주세요.'
    },
    {
      id: 11,
      category: '01',
      q: '동시에 여러 명이 같은 탐지를 처리하면 어떻게 되나요?',
      a: '마지막 저장이 반영됩니다. 다른 담당자가 먼저 변경한 경우 이력 로그에 변경 내역이 기록되므로, 조치 메모를 통해 중복 처리를 방지하시기 바랍니다.'
    },
    {
      id: 12,
      category: '04',
      q: '시스템 점검 일정은 어디서 확인하나요?',
      a: '공지사항 메뉴의 "업무" 구분에서 정기 점검 일정을 확인할 수 있으며, 점검 시작 24시간 전 상단 배너로 재공지됩니다.'
    },
    {
      id: 13,
      category: '04',
      q: 'AI 분석 중 오류가 발생했는데 어떻게 해야 하나요?',
      a: '분석 실행 이력에서 해당 작업의 상태가 "실패"로 표시되며, 클릭하면 원인 메시지를 확인할 수 있습니다.\n\n· 파일 손상/포맷 불일치: 원본 영상을 다시 업로드\n· GPU 자원 부족: 잠시 후 재시도 또는 담당자 문의\n· 타임아웃: 영상을 권역 단위로 분할 후 재실행\n\n반복 발생 시 서비스 지원 > 문의하기로 오류 스크린샷과 작업 ID를 남겨주세요.'
    }
  ];

  var CAT_LABEL = {
    '01': '서비스 이용',
    '02': '데이터 업로드',
    '03': '분석 서비스',
    '04': '오류 및 점검',
    '05': '자료 다운로드',
    '06': '기타'
  };

  var state = { cat: 'all', field: 'all', keyword: '', openIds: {} };

  function getFiltered() {
    var list = FAQS.slice();
    if (state.cat !== 'all') {
      list = list.filter(function (f) { return f.category === state.cat; });
    }
    if (state.keyword) {
      var kw = state.keyword.toLowerCase();
      list = list.filter(function (f) {
        if (state.field === 'title') return f.q.toLowerCase().indexOf(kw) !== -1;
        if (state.field === 'content') return f.a.toLowerCase().indexOf(kw) !== -1;
        // all
        return f.q.toLowerCase().indexOf(kw) !== -1 || f.a.toLowerCase().indexOf(kw) !== -1;
      });
    }
    return list;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function render() {
    var list = getFiltered();
    var wrap = document.getElementById('faq-list');
    var emptyWrap = document.getElementById('empty-state-wrap');
    var countEl = document.getElementById('faq-count');

    countEl.innerHTML = '총 <strong>' + list.length + '</strong>개';
    wrap.innerHTML = '';
    emptyWrap.innerHTML = '';

    if (list.length === 0) {
      emptyWrap.innerHTML =
        '<div class="empty-state">' +
          '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<p>검색 조건에 맞는 질문이 없습니다.</p>' +
        '</div>';
      return;
    }

    list.forEach(function (f) {
      var item = document.createElement('div');
      item.className = 'faq-item' + (state.openIds[f.id] ? ' open' : '');
      item.innerHTML =
        '<button type="button" class="faq-q">' +
          '<span class="faq-q-marker">Q</span>' +
          '<span class="faq-q-cat ' + f.category + '">' + CAT_LABEL[f.category] + '</span>' +
          '<span class="faq-q-text">' + escapeHtml(f.q) + '</span>' +
          '<svg class="faq-q-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
        '</button>' +
        '<div class="faq-a">' +
          '<div class="faq-a-inner">' +
            '<div class="faq-a-body">' +
              '<span class="faq-q-marker a">A</span>' +
              '<div>' + escapeHtml(f.a) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      item.querySelector('.faq-q').addEventListener('click', function () {
        if (state.openIds[f.id]) {
          delete state.openIds[f.id];
          item.classList.remove('open');
        } else {
          state.openIds[f.id] = true;
          item.classList.add('open');
        }
      });

      wrap.appendChild(item);
    });
  }

  // 구분·검색필드 select + 검색 input + 초기화/검색 버튼
  var catSelect = document.getElementById('faq-cat');
  var fieldSelect = document.getElementById('faq-search-field');
  var searchInput = document.getElementById('search-input');

  function applySearch() {
    state.cat = catSelect.value;
    state.field = fieldSelect.value;
    state.keyword = searchInput.value.trim();
    render();
  }

  document.getElementById('faq-search').addEventListener('click', applySearch);
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') applySearch();
  });
  document.getElementById('faq-reset').addEventListener('click', function () {
    catSelect.value = 'all';
    fieldSelect.value = 'all';
    searchInput.value = '';
    state.cat = 'all';
    state.field = 'all';
    state.keyword = '';
    render();
  });

  render();
})();
</script>
</body>
</html>
