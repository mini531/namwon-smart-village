<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 관리 - Namwon GeoVision</title>
  <link rel="icon" href="assets/images/favicon_n.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/menu.css">
  <link rel="stylesheet" href="assets/css/admin-common.css">
  <link rel="stylesheet" href="assets/css/page-admin-users.css">
</head>
<body>

<div id="header-include"></div>

<div class="page-body">
  <div class="admin-container">

    <div class="page-header">
      <div class="page-title-wrap">
        <h1>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span id="page-title-text">사용자 관리</span>
        </h1>
        <p id="page-title-sub">등록된 사용자를 조회하고 권한·상태를 관리하거나 계정을 탈퇴·삭제할 수 있습니다</p>
      </div>
    </div>

    <!-- 목록 뷰 -->
    <section class="admin-list-view" id="list-view">
      <div class="board-toolbar">
        <div class="board-field board-field--search">
          <label for="us-search-input">검색어</label>
          <div class="board-field-row">
            <select class="board-search-select" id="us-search-field">
              <option value="all">전체</option>
              <option value="email">이메일</option>
              <option value="name">이름</option>
              <option value="phone">전화번호</option>
            </select>
            <input type="text" class="board-search-input" id="us-search-input" placeholder="검색어">
          </div>
        </div>
        <div class="board-field">
          <label for="us-dept">부서</label>
          <select class="board-search-select" id="us-dept">
            <option value="all">전체</option>
            <option value="도로관리과">도로관리과</option>
            <option value="홍보전산과">홍보전산과</option>
            <option value="농업기술센터">농업기술센터</option>
            <option value="환경관리과">환경관리과</option>
            <option value="기획감사실">기획감사실</option>
          </select>
        </div>
        <div class="board-field">
          <label for="us-status">상태</label>
          <select class="board-search-select" id="us-status">
            <option value="all">전체</option>
            <option value="active">활성</option>
            <option value="inactive">비활성</option>
            <option value="withdrawn">탈퇴</option>
          </select>
        </div>
        <div class="board-field board-field--period">
          <label>가입일</label>
          <div class="board-period-row">
            <div class="board-period-dates">
              <input type="date" class="board-date-input" id="us-from">
              <span class="board-period-sep">~</span>
              <input type="date" class="board-date-input" id="us-to">
            </div>
            <div class="board-period-quicks">
              <button type="button" class="board-quick-btn active" data-months="0">전체</button>
              <button type="button" class="board-quick-btn" data-months="1">1개월</button>
              <button type="button" class="board-quick-btn" data-months="3">3개월</button>
              <button type="button" class="board-quick-btn" data-months="6">6개월</button>
              <button type="button" class="board-quick-btn" data-months="12">12개월</button>
            </div>
          </div>
        </div>
        <div class="board-toolbar-actions board-toolbar-actions--end">
          <button type="button" class="board-btn" id="us-reset">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            초기화
          </button>
          <button type="button" class="board-btn" id="us-search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            검색
          </button>
        </div>
      </div>

      <div class="admin-list-card">
        <div class="admin-list-head">
          <div class="admin-list-title">사용자 목록</div>
        </div>
        <table class="admin-table users-table">
          <thead>
            <tr>
              <th>아이디(이메일)</th>
              <th class="col-name">이름</th>
              <th class="col-phone">전화번호</th>
              <th class="col-dept">부서</th>
              <th class="col-rank">직위</th>
              <th class="col-status">상태</th>
              <th class="col-date">가입 일시</th>
              <th class="col-date">마지막 로그인</th>
            </tr>
          </thead>
          <tbody id="us-tbody"></tbody>
        </table>
        <div id="us-empty-wrap"></div>
      </div>

      <div class="board-paginator">
        <button type="button" class="board-page-btn" id="us-first">처음</button>
        <button type="button" class="board-page-btn" id="us-prev">이전</button>
        <div class="board-page-pages" id="us-pages"></div>
        <button type="button" class="board-page-btn" id="us-next">다음</button>
        <button type="button" class="board-page-btn" id="us-last">마지막</button>
        <div class="board-page-size-wrap">
          <select class="board-page-size" id="us-page-size">
            <option value="10">10</option><option value="20">20</option><option value="50">50</option>
          </select>
          <span>페이지 크기</span>
        </div>
        <div class="board-count" id="us-count">총 <strong>0</strong>건 중 0~0행</div>
      </div>
    </section>

    <!-- 상세 뷰 -->
    <section class="admin-view-view hidden" id="view-view">
      <div class="admin-card-grid cols-3">
        <!-- 소속 정보 -->
        <div class="admin-info-card">
          <div class="ic-head">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            소속 정보
          </div>
          <div class="ic-row"><span class="ic-label">이름</span>
            <input type="text" class="form-control" id="d-name"></div>
          <div class="ic-row"><span class="ic-label">전화번호</span>
            <input type="text" class="form-control" id="d-phone" placeholder="010-0000-0000"></div>
          <div class="ic-row"><span class="ic-label">부서</span>
            <select class="form-control" id="d-dept">
              <option value="도로관리과">도로관리과</option>
              <option value="홍보전산과">홍보전산과</option>
              <option value="농업기술센터">농업기술센터</option>
              <option value="환경관리과">환경관리과</option>
              <option value="기획감사실">기획감사실</option>
            </select>
          </div>
          <div class="ic-row"><span class="ic-label">직위</span>
            <input type="text" class="form-control" id="d-rank" placeholder="주무관 · 팀장 등"></div>
        </div>

        <!-- 계정 정보 -->
        <div class="admin-info-card">
          <div class="ic-head">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            계정 정보
          </div>
          <div class="ic-row"><span class="ic-label">아이디</span>
            <span class="ic-value" id="d-email">-</span></div>
          <div class="ic-row"><span class="ic-label">계정 상태</span>
            <span class="ic-value"><span class="admin-pill" id="d-status">-</span></span></div>
          <div class="ic-row"><span class="ic-label">계정 사용기한</span>
            <input type="date" class="form-control" id="d-expires"></div>
          <div class="ic-row"><span class="ic-label">가입 일시</span>
            <span class="ic-value" id="d-joined">-</span></div>
          <div class="ic-row"><span class="ic-label">마지막 로그인</span>
            <span class="ic-value" id="d-last-login">-</span></div>
          <div class="ic-row"><span class="ic-label">비밀번호 실패</span>
            <span class="ic-value" style="display:flex;align-items:center;gap:8px;">
              <strong id="d-pwd-fails">0</strong> 회
              <button type="button" class="board-btn" id="d-reset-fails" style="padding:0 10px;height:28px;font-size:12px;">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                초기화
              </button>
            </span>
          </div>
        </div>

        <!-- 권한 정보 -->
        <div class="admin-info-card">
          <div class="ic-head">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            권한 정보
          </div>
          <div class="role-list" id="d-roles">
            <label class="role-item"><input type="checkbox" class="form-check" value="admin"><span>시스템 관리자</span></label>
            <label class="role-item"><input type="checkbox" class="form-check" value="analyze"><span>AI 분석 실행</span></label>
            <label class="role-item"><input type="checkbox" class="form-check" value="report"><span>보고서 관리</span></label>
            <label class="role-item"><input type="checkbox" class="form-check" value="dataset"><span>학습 데이터 관리</span></label>
            <label class="role-item"><input type="checkbox" class="form-check" value="map"><span>지도 서비스</span></label>
            <label class="role-item"><input type="checkbox" class="form-check" value="unlimited"><span>제한 없음</span></label>
          </div>
        </div>
      </div>

      <!-- 이력 탭 -->
      <div class="admin-view-card history-card">
        <div class="history-tabs" role="tablist">
          <button type="button" class="history-tab active" data-tab="login" role="tab">로그인 이력</button>
          <button type="button" class="history-tab" data-tab="pwd" role="tab">비밀번호 오류 이력</button>
        </div>
        <div class="history-panel" id="history-login">
          <table class="admin-table">
            <thead>
              <tr>
                <th>로그인 ID</th>
                <th class="col-ip">접속 IP</th>
                <th class="col-status">성공 여부</th>
                <th>실패 사유</th>
                <th class="col-date">접속 일시</th>
              </tr>
            </thead>
            <tbody id="login-tbody"></tbody>
          </table>
        </div>
        <div class="history-panel hidden" id="history-pwd">
          <table class="admin-table">
            <thead>
              <tr>
                <th>로그인 ID</th>
                <th class="col-ip">접속 IP</th>
                <th>상세 사유</th>
                <th class="col-date">발생 일시</th>
              </tr>
            </thead>
            <tbody id="pwd-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="form-actions form-actions--split">
        <button type="button" class="board-btn" id="d-list">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          목록
        </button>
        <div class="form-actions-group">
          <button type="button" class="board-btn board-btn-danger" id="d-delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6M5 6l1 14a2 2 0 002 2h8a2 2 0 002-2l1-14"/></svg>
            완전 삭제
          </button>
          <button type="button" class="board-btn board-btn-danger" id="d-withdraw">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg>
            탈퇴 처리
          </button>
          <button type="button" class="board-btn board-btn-primary" id="d-save">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            저장
          </button>
        </div>
      </div>
    </section>

  </div>

  <div id="footer-include"></div>
</div>

  var STATUS_LABEL = { active: '활성', inactive: '비활성', withdrawn: '탈퇴' };

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return DEFAULT_SEED.slice();
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.list)); } catch (e) {}
  }
  function fmtDateTime(iso) {
    if (!iso) return '-';
    return iso.replace('T', ' ').replace(/-/g, '.').substring(0, 19);
  }
  function escapeHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  var state = {
    list: load(),
    filter: { field: 'all', keyword: '', dept: 'all', status: 'all', from: '', to: '', quick: 0 },
    page: 1,
    pageSize: 10,
    viewingId: null
  };

  function getFiltered() {
    var list = state.list.slice();
    var f = state.filter;
    if (f.dept !== 'all') list = list.filter(function (n) { return n.dept === f.dept; });
    if (f.status !== 'all') list = list.filter(function (n) { return n.status === f.status; });
    if (f.keyword) {
      var kw = f.keyword.toLowerCase();
      list = list.filter(function (n) {
        if (f.field === 'email') return (n.email || '').toLowerCase().indexOf(kw) !== -1;
        if (f.field === 'name') return (n.name || '').toLowerCase().indexOf(kw) !== -1;
        if (f.field === 'phone') return (n.phone || '').indexOf(kw) !== -1;
        return (n.email || '').toLowerCase().indexOf(kw) !== -1 ||
          (n.name || '').toLowerCase().indexOf(kw) !== -1 ||
          (n.phone || '').indexOf(kw) !== -1;
      });
    }
    if (f.from) list = list.filter(function (n) { return (n.joined || '').substring(0, 10) >= f.from; });
    if (f.to) list = list.filter(function (n) { return (n.joined || '').substring(0, 10) <= f.to; });
    list.sort(function (a, b) { return (b.joined || '').localeCompare(a.joined || ''); });
    return list;
  }

  function renderList() {
    var tbody = document.getElementById('us-tbody');
    var emptyWrap = document.getElementById('us-empty-wrap');
    var countEl = document.getElementById('us-count');
    var list = getFiltered();
    var total = list.length;
    tbody.innerHTML = '';
    emptyWrap.innerHTML = '';

    if (total === 0) {
      emptyWrap.innerHTML =
        '<div class="uc-empty" style="padding:50px 20px;text-align:center;color:var(--color-text-muted);">' +
          '<p style="font-size:14px;">검색 조건에 맞는 사용자가 없습니다.</p></div>';
      countEl.innerHTML = '총 <strong>0</strong>건 중 0~0행';
      renderPagination(1);
      return;
    }

    var totalPages = Math.max(1, Math.ceil(total / state.pageSize));
    if (state.page > totalPages) state.page = totalPages;
    var startIdx = (state.page - 1) * state.pageSize;
    var endIdx = Math.min(total, startIdx + state.pageSize);

    list.slice(startIdx, endIdx).forEach(function (u) {
      var tr = document.createElement('tr');
      tr.dataset.id = u.id;
      tr.innerHTML =
        '<td><button type="button" class="title-link" data-id="' + u.id + '">' + escapeHtml(u.email) + '</button></td>' +
        '<td class="col-name">' + escapeHtml(u.name) + '</td>' +
        '<td class="col-phone">' + escapeHtml(u.phone || '-') + '</td>' +
        '<td class="col-dept">' + escapeHtml(u.dept || '-') + '</td>' +
        '<td class="col-rank">' + escapeHtml(u.rank || '-') + '</td>' +
        '<td class="col-status"><span class="admin-pill ' + u.status + '">' + STATUS_LABEL[u.status] + '</span></td>' +
        '<td class="col-date">' + fmtDateTime(u.joined).substring(0, 16) + '</td>' +
        '<td class="col-date">' + fmtDateTime(u.lastLogin).substring(0, 16) + '</td>';
      tbody.appendChild(tr);
    });

    countEl.innerHTML = '총 <strong>' + total + '</strong>건 중 ' + (startIdx + 1) + '~' + endIdx + '행';
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    var pagesEl = document.getElementById('us-pages');
    pagesEl.innerHTML = '';
    document.getElementById('us-first').disabled = document.getElementById('us-prev').disabled = state.page <= 1;
    document.getElementById('us-next').disabled = document.getElementById('us-last').disabled = state.page >= totalPages;
    var start = Math.max(1, state.page - 2);
    var end = Math.min(totalPages, start + 4);
    start = Math.max(1, end - 4);
    for (var p = start; p <= end; p++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'board-page-btn' + (p === state.page ? ' active' : '');
      btn.textContent = String(p);
      (function (pg) { btn.addEventListener('click', function () { state.page = pg; renderList(); }); })(p);
      pagesEl.appendChild(btn);
    }
  }

  var VIEW_TITLES = {
    list: { title: '사용자 관리',  sub: '등록된 사용자를 조회하고 권한·상태를 관리하거나 계정을 탈퇴·삭제할 수 있습니다' },
    view: { title: '사용자 상세',  sub: '사용자 정보·권한·접속 이력을 확인하고 수정합니다' }
  };
  function updatePageTitle(key) {
    var t = VIEW_TITLES[key] || VIEW_TITLES.list;
    document.getElementById('page-title-text').textContent = t.title;
    document.getElementById('page-title-sub').textContent = t.sub;
    document.title = t.title + ' - Namwon GeoVision';
  }
  function showView(which) {
    document.getElementById('list-view').classList.toggle('hidden', which !== 'list');
    document.getElementById('view-view').classList.toggle('hidden', which !== 'view');
    updatePageTitle(which);
    document.querySelector('.page-body').scrollTo({ top: 0, behavior: 'auto' });
  }

  function renderHistoryTables(id) {
    var loginList = LOGIN_HISTORY[id] || [];
    var pwdList = PWD_HISTORY[id] || [];
    var lt = document.getElementById('login-tbody');
    lt.innerHTML = loginList.length
      ? loginList.map(function (r) {
          return '<tr>' +
            '<td>' + escapeHtml(r.loginId) + '</td>' +
            '<td class="col-ip">' + escapeHtml(r.ip) + '</td>' +
            '<td class="col-status"><span class="admin-pill ' + (r.success ? 'ok' : 'off') + '">' + (r.success ? '성공' : '실패') + '</span></td>' +
            '<td>' + escapeHtml(r.reason || '-') + '</td>' +
            '<td class="col-date">' + fmtDateTime(r.at) + '</td>' +
          '</tr>';
        }).join('')
      : '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--color-text-muted);">로그인 이력이 없습니다.</td></tr>';

    var pt = document.getElementById('pwd-tbody');
    pt.innerHTML = pwdList.length
      ? pwdList.map(function (r) {
          return '<tr>' +
            '<td>' + escapeHtml(r.loginId) + '</td>' +
            '<td class="col-ip">' + escapeHtml(r.ip) + '</td>' +
            '<td>' + escapeHtml(r.reason) + '</td>' +
            '<td class="col-date">' + fmtDateTime(r.at) + '</td>' +
          '</tr>';
        }).join('')
      : '<tr><td colspan="4" style="text-align:center;padding:30px;color:var(--color-text-muted);">비밀번호 오류 이력이 없습니다.</td></tr>';
  }

  function openDetail(id) {
    var u = state.list.find(function (x) { return x.id === id; });
    if (!u) return;
    state.viewingId = id;
    document.getElementById('d-name').value = u.name || '';
    document.getElementById('d-phone').value = u.phone || '';
    document.getElementById('d-dept').value = u.dept || '';
    document.getElementById('d-rank').value = u.rank || '';
    document.getElementById('d-email').textContent = u.email;
    var statusEl = document.getElementById('d-status');
    statusEl.className = 'admin-pill ' + u.status;
    statusEl.textContent = STATUS_LABEL[u.status];
    document.getElementById('d-expires').value = u.expires || '';
    document.getElementById('d-joined').textContent = fmtDateTime(u.joined);
    document.getElementById('d-last-login').textContent = fmtDateTime(u.lastLogin);
    document.getElementById('d-pwd-fails').textContent = u.pwdFails || 0;

    var roles = u.roles || [];
    document.querySelectorAll('#d-roles input[type="checkbox"]').forEach(function (cb) {
      cb.checked = roles.indexOf(cb.value) !== -1;
    });

    renderHistoryTables(id);
    // 탭 초기화 — 항상 로그인 이력으로
    document.querySelectorAll('.history-tab').forEach(function (t) {
      t.classList.toggle('active', t.dataset.tab === 'login');
    });
    document.getElementById('history-login').classList.remove('hidden');
    document.getElementById('history-pwd').classList.add('hidden');

    showView('view');
  }

  function saveDetail() {
    var idx = state.list.findIndex(function (x) { return x.id === state.viewingId; });
    if (idx < 0) return;
    state.list[idx].name = document.getElementById('d-name').value.trim();
    state.list[idx].phone = document.getElementById('d-phone').value.trim();
    state.list[idx].dept = document.getElementById('d-dept').value;
    state.list[idx].rank = document.getElementById('d-rank').value.trim();
    state.list[idx].expires = document.getElementById('d-expires').value;
    state.list[idx].roles = Array.prototype.slice
      .call(document.querySelectorAll('#d-roles input[type="checkbox"]:checked'))
      .map(function (cb) { return cb.value; });
    save();
    if (window.NotifyUI) NotifyUI.toast('사용자 정보가 저장되었습니다', '완료');
  }

  function resetPwdFails() {
    ConfirmModal.open({
      title: '확인',
      message: '비밀번호 실패 횟수를 초기화 하시겠습니까?',
      onConfirm: function () {
        var idx = state.list.findIndex(function (x) { return x.id === state.viewingId; });
        if (idx < 0) return;
        state.list[idx].pwdFails = 0;
        save();
        document.getElementById('d-pwd-fails').textContent = 0;
      }
    });
  }

  function withdrawUser() {
    ConfirmModal.open({
      title: '확인',
      message: '사용자를 탈퇴 처리하시겠습니까? (계정 상태가 비활성화됩니다)',
      danger: true,
      onConfirm: function () {
        var idx = state.list.findIndex(function (x) { return x.id === state.viewingId; });
        if (idx < 0) return;
        state.list[idx].status = 'withdrawn';
        save();
        var statusEl = document.getElementById('d-status');
        statusEl.className = 'admin-pill withdrawn';
        statusEl.textContent = STATUS_LABEL.withdrawn;
      }
    });
  }

  function deleteUser() {
    ConfirmModal.open({
      title: '확인',
      message: '사용자를 완전히 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.',
      danger: true,
      onConfirm: function () {
        state.list = state.list.filter(function (n) { return n.id !== state.viewingId; });
        save();
        state.viewingId = null;
        showView('list');
        renderList();
      }
    });
  }

  function applyQuick(months) {
    var to = '', from = '';
    if (months > 0) {
      var now = new Date();
      var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
      to = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
      var past = new Date(now);
      past.setMonth(past.getMonth() - months);
      from = past.getFullYear() + '-' + pad(past.getMonth() + 1) + '-' + pad(past.getDate());
    }
    document.getElementById('us-from').value = from;
    document.getElementById('us-to').value = to;
    state.filter.quick = months;
    document.querySelectorAll('.board-quick-btn[data-months]').forEach(function (b) {
      b.classList.toggle('active', parseInt(b.dataset.months, 10) === months);
    });
  }
  function applySearch() {
    state.filter.field = document.getElementById('us-search-field').value;
    state.filter.keyword = document.getElementById('us-search-input').value.trim();
    state.filter.dept = document.getElementById('us-dept').value;
    state.filter.status = document.getElementById('us-status').value;
    state.filter.from = document.getElementById('us-from').value;
    state.filter.to = document.getElementById('us-to').value;
    state.page = 1;
    renderList();
  }

  // ── 이벤트 ──
  document.getElementById('us-search').addEventListener('click', applySearch);
  document.getElementById('us-search-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') applySearch();
  });
  document.getElementById('us-reset').addEventListener('click', function () {
    document.getElementById('us-search-field').value = 'all';
    document.getElementById('us-search-input').value = '';
    document.getElementById('us-dept').value = 'all';
    document.getElementById('us-status').value = 'all';
    applyQuick(0);
    state.filter = { field: 'all', keyword: '', dept: 'all', status: 'all', from: '', to: '', quick: 0 };
    state.page = 1;
    renderList();
  });
  document.querySelectorAll('.board-quick-btn[data-months]').forEach(function (b) {
    b.addEventListener('click', function () { applyQuick(parseInt(b.dataset.months, 10)); });
  });
  document.getElementById('us-first').addEventListener('click', function () { state.page = 1; renderList(); });
  document.getElementById('us-prev').addEventListener('click', function () {
    if (state.page > 1) { state.page -= 1; renderList(); }
  });
  document.getElementById('us-next').addEventListener('click', function () { state.page += 1; renderList(); });
  document.getElementById('us-last').addEventListener('click', function () {
    state.page = Math.max(1, Math.ceil(getFiltered().length / state.pageSize));
    renderList();
  });
  document.getElementById('us-page-size').addEventListener('change', function () {
    state.pageSize = parseInt(this.value, 10) || 10;
    state.page = 1;
    renderList();
  });
  document.getElementById('us-tbody').addEventListener('click', function (e) {
    var tbtn = e.target.closest('.title-link');
    if (tbtn) { openDetail(parseInt(tbtn.dataset.id, 10)); return; }
  });

  // 탭 전환
  document.querySelectorAll('.history-tab').forEach(function (t) {
    t.addEventListener('click', function () {
      document.querySelectorAll('.history-tab').forEach(function (x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.getElementById('history-login').classList.toggle('hidden', t.dataset.tab !== 'login');
      document.getElementById('history-pwd').classList.toggle('hidden', t.dataset.tab !== 'pwd');
    });
  });

  document.getElementById('d-list').addEventListener('click', function () {
    state.viewingId = null;
    showView('list');
    renderList();
  });
  document.getElementById('d-save').addEventListener('click', saveDetail);
  document.getElementById('d-reset-fails').addEventListener('click', resetPwdFails);
  document.getElementById('d-withdraw').addEventListener('click', withdrawUser);
  document.getElementById('d-delete').addEventListener('click', deleteUser);

  renderList();
})();
